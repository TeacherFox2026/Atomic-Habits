<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>原子習慣養成</title>
    
    <link rel="manifest" href="./manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Marker Felt', 'Segoe UI', sans-serif;
            background-color: #fdf8f5; 
            background-image: radial-gradient(#fde2e4 3px, transparent 3px);
            background-size: 30px 30px;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        .app-wrapper { 
            max-width: 480px; margin: 0 auto; min-height: 100vh; 
            display: flex; flex-direction: column; transition: filter 0.3s; 
            padding-bottom: env(safe-area-inset-bottom);
        }
        @media (min-width: 768px) {
            .app-wrapper { max-width: 1024px; flex-direction: row; gap: 20px; padding: 20px; min-height: calc(100vh - 40px); }
            .panel-left { flex: 5; display: flex; flex-direction: column; background: #fff; border-radius: 2rem; border: 4px solid #1f2937; box-shadow: 8px 8px 0px #1f2937; position: relative; z-index: 10; }
            .panel-right { flex: 4; display: flex; flex-direction: column; background: #fff; border-radius: 2rem; border: 4px solid #1f2937; box-shadow: 8px 8px 0px #1f2937; padding: 20px; overflow-y: auto; }
            body { padding: 0; }
            #main-header { border-top-left-radius: calc(2rem - 4px); border-top-right-radius: calc(2rem - 4px); }
        }
        @media (max-width: 767px) {
            .app-wrapper { background-color: #ffffff; border-left: 4px solid #1f2937; border-right: 4px solid #1f2937; overflow-x: hidden; }
            .panel-right { padding: 20px; padding-top: 0; flex: 1; }
        }

        .hand-drawn-border { border: 4px solid #1f2937; border-radius: 24px 12px 24px 12px; box-shadow: 4px 4px 0px #1f2937; transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .hand-drawn-btn:active { transform: translate(4px, 4px) !important; box-shadow: 0px 0px 0px #1f2937 !important; }
        .bg-theme-transition { transition: background 0.5s ease-in-out; border-bottom: 4px solid #1f2937; }

        input, textarea, select, [contenteditable="true"] { font-size: 16px !important; }
        .no-select { user-select: none; -webkit-user-select: none; }

        @keyframes float { 0%, 100% { transform: translateY(0) rotate(-2deg); } 50% { transform: translateY(-8px) rotate(2deg); } }
        .mascot-float { animation: float 3s infinite ease-in-out; }
        @keyframes popIn { 0% { transform: scale(0.8) rotate(5deg); opacity: 0; } 100% { transform: scale(1) rotate(0deg); opacity: 1; } }
        .pop-in { animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes fireFlicker { 0%, 100% { transform: scale(1) rotate(-2deg); } 50% { transform: scale(1.1) rotate(2deg); } }
        .fire-anim { animation: fireFlicker 1s infinite alternate; }
        @keyframes heartRise { 0% { transform: translateY(0) scale(0.5); opacity: 1; } 100% { transform: translateY(-60px) scale(1.5); opacity: 0; } }
        .heart-float { animation: heartRise 1s ease-out forwards; position: absolute; pointer-events: none; z-index: 100; }
        @keyframes sway { 0%, 100% { transform: rotate(-1.5deg); } 50% { transform: rotate(1.5deg); } }
        .tree-sway { animation: sway 4s ease-in-out infinite; transform-origin: 100px 140px; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .loading-spin { animation: spin 1s linear infinite; }

        @keyframes slideInRight { from { transform: translateX(30px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes slideInLeft { from { transform: translateX(-30px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .anim-slide-in-right { animation: slideInRight 0.25s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; }
        .anim-slide-in-left { animation: slideInLeft 0.25s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; }

        #golden-rain { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; display: none; background: rgba(0,0,0,0.4); }
        .falling-coin { position: absolute; top: -50px; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(110vh) rotate(720deg); } }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
        #mail-input[contenteditable="true"]:empty:before { content: attr(placeholder); color: #9ca3af; pointer-events: none; display: block; }
        .liquid-fill { transition: height 1s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    </style>
</head>
<body class="antialiased text-gray-800">
    <div id="sync-overlay" class="fixed inset-0 z-[200] bg-white/80 backdrop-blur-md flex flex-col items-center justify-center transition-opacity duration-500 hidden opacity-0">
        <div class="w-20 h-24 mb-4 relative mascot-float" id="sync-mascot-img"></div>
        <p class="font-black text-xl text-blue-600 tracking-widest drop-shadow-sm" id="sync-msg">連線雲端手帳中...</p>
        <p class="text-gray-500 font-bold text-sm mt-2">全家人的足跡同步中</p>
    </div>
    
    <div id="golden-rain"></div>

    <div id="auth-modal" class="fixed inset-0 bg-gray-900/90 z-[300] flex flex-col items-center justify-center px-4 transition-opacity hidden opacity-0 backdrop-blur-md">
        <div class="bg-white w-[90vw] max-w-[360px] rounded-[2rem] p-6 border-8 border-gray-800 shadow-[8px_8px_0px_#1f2937] text-center relative">
            <h3 class="text-2xl font-black mb-4">🔐 私密家庭手帳</h3>
            <p class="text-sm font-bold text-gray-600 mb-6">歡迎回家！請輸入通關密碼：</p>
            <input type="password" id="auth-input" class="w-full border-4 border-gray-800 rounded-xl p-3 font-bold text-center text-xl mb-4 tracking-widest" placeholder="••••">
            <button onclick="SystemConfig.saveToken()" class="w-full bg-blue-500 text-white font-black py-3 rounded-xl border-4 border-gray-800 shadow-[4px_4px_0px_#1f2937] active:translate-y-1 active:shadow-none transition-all">確認進入</button>
            <p class="text-[10px] text-gray-400 mt-4 text-left">※ 只需輸入一次，裝置會永久記憶以保護資料安全。</p>
        </div>
    </div>

    <div class="app-wrapper">
        <div class="panel-left" id="main-panel-left">
            <header id="main-header" class="bg-theme-transition text-white p-5 pb-6 relative z-30 md:rounded-none rounded-b-[2rem] flex flex-col">
                <div class="flex justify-between items-start w-full relative z-50">
                    <div class="relative max-w-[65%]">
                        <button onclick="UI.toggleHabitMenu()" class="text-3xl font-black tracking-wide drop-shadow-md text-white flex items-center gap-1 active:scale-95 transition-transform" style="text-shadow: 2px 2px 0 #1f2937; max-width: 100%;">
                            <span id="app-title" class="truncate inline-block align-bottom max-w-[150px] md:max-w-[250px]">載入中...</span><span class="text-xl flex-shrink-0">▼</span>
                        </button>
                        <div id="identity-badge" class="mt-1 inline-flex items-center gap-1 bg-white/90 text-gray-800 px-3 py-0.5 rounded-full border-2 border-gray-800 text-xs font-black shadow-sm transform -rotate-1 max-w-full">
                            <div class="w-3 h-3 flex-shrink-0" id="icon-crown-header"></div> <span id="identity-text" class="truncate">稱號載入中</span>
                        </div>
                        
                        <div id="habit-dropdown" class="absolute top-full left-0 mt-2 bg-white hand-drawn-border p-2 hidden flex-col gap-2 w-56 shadow-[4px_4px_0px_#1f2937] z-[60]">
                            <div id="habit-list-container" class="flex flex-col gap-1 max-h-64 overflow-y-auto custom-scroll"></div>
                            <div class="border-t-2 border-dashed border-gray-300 my-1"></div>
                            
                            <button id="menu-install-btn" onclick="PWA.install()" class="hidden w-full text-left px-3 py-2 bg-green-50 hover:bg-green-100 rounded-lg font-black text-green-700 flex items-center gap-2 transition-colors">
                                <div class="w-4 h-4" id="icon-install-btn"></div> 安裝至手機桌面
                            </button>
                            <button onclick="SyncEngine.manualSync()" class="w-full text-left px-3 py-2 bg-blue-50 hover:bg-blue-100 rounded-lg font-black text-blue-700 flex items-center gap-2 transition-colors">
                                <div class="w-4 h-4" id="icon-sync-btn"></div> 立即同步雲端
                            </button>
                            <button onclick="Radio.openCMS()" class="w-full text-left px-3 py-2 bg-gray-100 hover:bg-gray-200 rounded-lg font-black text-gray-800 flex items-center gap-2 transition-colors">
                                <div class="w-4 h-4" id="icon-radio-btn"></div> 廣播台管理
                            </button>
                            <button onclick="Editor.open()" class="w-full text-left px-3 py-2 bg-gray-100 hover:bg-gray-200 rounded-lg font-black text-gray-800 flex items-center gap-2 transition-colors">
                                <div class="w-4 h-4" id="icon-setting-btn"></div> 系統與習慣管理
                            </button>
                        </div>
                    </div>
                    
                    <div class="flex items-center gap-2 flex-shrink-0">
                        <button onclick="AudioEngine.toggleMute()" id="mute-btn" class="w-10 h-10 bg-white/30 rounded-full border-2 border-white/50 flex items-center justify-center shadow-sm hover:bg-white/50 transition-colors p-2"></button>
                        <div class="flex space-x-1.5 bg-white/30 p-1.5 rounded-2xl hand-drawn-border shadow-[2px_2px_0px_#1f2937]" id="user-switcher"></div>
                    </div>
                </div>
                
                <div class="flex flex-row justify-between items-end w-full relative z-40 mt-4 md:mt-6">
                    <div class="flex items-center gap-2">
                        <button onclick="Report.open()" id="trophy-btn" class="w-12 h-12 bg-yellow-200 rounded-xl hand-drawn-border flex items-center justify-center shadow-[2px_2px_0px_#1f2937] transition-all hover:bg-yellow-300 p-2"></button>
                        <button onclick="Mail.open()" id="mailbox-btn" class="w-12 h-12 bg-cyan-100 rounded-xl hand-drawn-border flex items-center justify-center relative shadow-[2px_2px_0px_#1f2937] transition-all hover:bg-cyan-200 p-1.5">
                            <span id="mail-badge" class="hidden absolute -top-2 -right-2 bg-red-500 text-white text-[10px] font-black w-5 h-5 rounded-full border-2 border-gray-800 flex items-center justify-center z-10">!</span>
                        </button>
                        <button onclick="Shop.open()" id="shop-btn" class="w-12 h-12 bg-pink-200 rounded-xl hand-drawn-border flex items-center justify-center shadow-[2px_2px_0px_#1f2937] transition-all hover:bg-pink-300 p-2"></button>
                    </div>
                    
                    <div class="flex items-center gap-2 bg-white/40 px-3 py-1.5 rounded-xl border-2 border-gray-800 shadow-[2px_2px_0px_#1f2937]">
                        <div class="flex items-center gap-1" title="手邊金幣">
                            <div class="w-5 h-5" id="coin-icon"></div>
                            <span class="text-xl font-black drop-shadow-md text-gray-800" id="current-coins">0</span>
                        </div>
                        <div class="w-px h-5 bg-gray-800 opacity-30 mx-1"></div>
                        <div class="flex items-center gap-1" title="綜合活躍連勝">
                            <div class="w-5 h-5 fire-anim" id="flame-icon"></div>
                            <span class="text-xl font-black drop-shadow-md text-gray-800" id="overall-streak">0</span>
                        </div>
                    </div>
                </div>
            </header>

            <div class="w-full flex flex-row items-end justify-end z-40 px-4 -mt-8 relative pointer-events-none">
                <div class="bg-white border-4 border-gray-800 text-gray-800 px-4 py-3 rounded-2xl rounded-br-none shadow-[4px_4px_0px_#1f2937] mb-6 mr-[-10px] text-sm font-black text-left w-[180px] md:w-[200px] pointer-events-auto relative z-50 transform -rotate-2 opacity-0 transition-opacity duration-500" id="mascot-speech"></div>
                <div class="w-24 h-24 md:w-28 md:h-28 mascot-float cursor-pointer pointer-events-auto relative z-50 no-select flex-shrink-0" id="mascot-img" 
                     onmousedown="EasterEggs.startPress(event)" onmouseup="EasterEggs.endPress(event)" onmouseleave="EasterEggs.cancelPress(event)"
                     ontouchstart="EasterEggs.startPress(event)" ontouchend="EasterEggs.endPress(event)" ontouchcancel="EasterEggs.cancelPress(event)"></div>
            </div>

            <div class="p-5 pt-2 flex-1 bg-white md:bg-transparent flex flex-col relative z-10">
                <div id="family-buff-banner" class="hidden w-full mb-4 bg-red-500 text-white font-black text-sm px-4 py-2 rounded-xl border-4 border-gray-800 shadow-[2px_2px_0px_#1f2937] transform rotate-1 pop-in flex items-center justify-center gap-2">
                    <div class="w-5 h-5" id="buff-tree-icon"></div> 全家連擊中！今日金幣 x1.2 倍
                </div>
                
                <div id="action-title-container" class="inline-flex items-center justify-between border-2 border-gray-800 px-3 py-2 rounded-lg font-black text-sm transform -rotate-1 mb-4 shadow-[2px_2px_0px_#1f2937] transition-colors duration-300 bg-white">
                    <div class="flex items-center gap-2">
                        <div class="w-4 h-4" id="title-sparkle-icon"></div>
                        <span id="action-title-text">準備好完成任務了嗎？</span>
                    </div>
                    <button id="cancel-recovery-btn" onclick="Logic.cancelRecovery()" class="hidden bg-red-400 text-white px-2 py-1 rounded-md border-2 border-gray-800 flex items-center gap-1 shadow-sm active:translate-y-1"><div class="w-3 h-3" id="icon-cancel-time"></div> 取消</button>
                </div>
                
                <div class="grid grid-cols-2 gap-4 pb-4" id="action-buttons"></div>
            </div>
        </div>

        <div class="panel-right pb-20 md:pb-5 relative z-10">
            <div class="bg-white p-5 hand-drawn-border bg-yellow-50 relative mt-4 md:mt-2">
                <div class="absolute -top-3 left-4 bg-yellow-300 border-2 border-gray-800 px-3 py-1 rounded-lg font-black text-xs transform -rotate-2">近 7 天活躍</div>
                <div class="flex justify-between items-center mt-3" id="calendar-row"></div>
            </div>

            <div class="mt-6 flex-1 flex flex-col relative">
                <div class="inline-flex items-center gap-1 bg-blue-300 border-2 border-gray-800 px-3 py-1 rounded-lg font-black text-xs transform -rotate-1 mb-3 self-start shadow-[2px_2px_0px_#1f2937]">
                    <div class="w-4 h-4" id="icon-paw-title"></div> 最近足跡
                </div>
                <div id="footprints-container" class="min-h-[80px] flex flex-col gap-3 pb-8"></div>
                <button id="btn-load-more-footprints" onclick="UI.loadMoreFootprints()" class="hidden mt-3 text-sm font-bold text-gray-500 bg-gray-100 hover:bg-gray-200 py-2 rounded-xl border-2 border-dashed border-gray-300 transition-colors flex items-center justify-center gap-2"><div class="w-4 h-4" id="icon-more-foot"></div> 展開歷史足跡 ▼</button>
            </div>
            
            <div class="text-right mt-6 opacity-40 hover:opacity-100 transition-opacity cursor-pointer flex items-center justify-end gap-1" onclick="EasterEggs.triggerAuthorEgg()">
                <span class="text-xs font-black text-gray-500">Made by TeacherFox</span>
                <div class="w-4 h-4" id="icon-author-fox"></div>
            </div>
        </div>
    </div>

    <div id="modals-container"></div>
    
    <div id="toast" class="fixed bottom-10 left-1/2 transform -translate-x-1/2 bg-gray-800 border-4 border-gray-900 text-white px-6 py-3 rounded-2xl shadow-[4px_4px_0px_rgba(0,0,0,0.3)] transition-all duration-300 opacity-0 pointer-events-none z-[200] font-bold text-center w-max max-w-[90%] flex items-center gap-2">
        <span id="toast-msg">提示！</span>
    </div>

    <input type="file" id="backup-file-input" class="hidden" accept=".json" onchange="SystemConfig.handleRestoreBackup(event)">

                if (dailyHabitData[u.uid].inventory) { delete dailyHabitData[u.uid].inventory; }

        function pruneAllData() {
            const cutOffTime = Date.now() - (40 * 24 * 60 * 60 * 1000); 
            users.forEach(u => {
                const uData = dailyHabitData[u.uid];
                if(uData.mails && uData.mails.length > 50) {
                    const mailsToPrune = uData.mails.slice(50);
                    let autoClaimedCoins = 0;
                    mailsToPrune.forEach(m => { if(m.attachedCoins && !m.isClaimed) autoClaimedCoins += m.attachedCoins; });
                    if(autoClaimedCoins > 0) { uData.currentCoins += autoClaimedCoins; uData.totalCoins += autoClaimedCoins; }
                    uData.mails = uData.mails.slice(0, 50);
                }
                if(uData.shopHistory) uData.shopHistory = uData.shopHistory.slice(0, 50);
                Object.keys(uData.habits || {}).forEach(hId => {
                    const logs = uData.habits[hId]?.logs || {};
                    Object.keys(logs).forEach(dateStr => {
                        if(logs[dateStr] && logs[dateStr].timestamp < cutOffTime) {
                            logs[dateStr].isPruned = true;
                            delete logs[dateStr].val; delete logs[dateStr].memo; delete logs[dateStr].bookTitle;
                        }
                    });
                });
            });
        }

            try {
                pruneAllData();
                localStorage.setItem('appTemplates_v13', JSON.stringify(appTemplates));

                localStorage.setItem('customRadios_v13', JSON.stringify(customRadios));

            let total = data.reduce((sum, d) => sum + d.value, 0);
            if (total === 0) return `<div class="w-full h-full bg-gray-100 rounded-full border-4 border-gray-800 flex items-center justify-center text-xs font-bold text-gray-400">無數據</div>`;
            let gradientStr = ""; let currentAngle = 0;
            data.forEach((d, i) => {
                let percentage = (d.value / total) * 100; gradientStr += `${d.color} ${currentAngle}% ${currentAngle + percentage}%`;
                if (i < data.length - 1) gradientStr += ", "; currentAngle += percentage;
            });
            return `<div class="w-full h-full rounded-full border-4 border-gray-800 shadow-[4px_4px_0px_#1f2937]" style="background: conic-gradient(${gradientStr});"></div>`;

                Object.keys(u.habits||{}).forEach(hId => {

        const Logic = {
            openActionModal(aId) { 
                try {
                    const today = getTodayStr(); 
                    const targetDateStr = recoveryDate || today;
                    
                    if(getUserData(currentUser.uid)?.habits?.[currentHabitId]?.logs?.[targetDateStr]) {
                        return UI.showToast(recoveryDate ? "補救的這天已經有打卡紀錄囉！" : "今天打過卡囉！可以修改歷史足跡喵"); 
                    }

                    if(SyncEngine.isSyncing || isProcessing) return UI.showToast("系統處理中，請稍後操作");
                    
                    const h = appTemplates[currentHabitId] || {actions:[]};
                    const act = h.actions.find(a=>a.id===aId); 
                    if(!act) return;
                    
                    if(act.isOneClick && !recoveryDate) { 
                        currentActionObj = act; isEditMode = false; editTargetDate = null; this.saveAction(true); 
                    } else { 
                        currentActionObj = act; isEditMode = false; editTargetDate = null; 
                        document.getElementById('input-book-title').value = getUserData(currentUser.uid)?.habits?.[currentHabitId]?.lastBookTitle || ""; 
                        document.getElementById('input-value').value = ""; document.getElementById('input-memo').value = ""; 
                        this.setupModalUI(act, !!recoveryDate); UI.openModal('input-modal'); 
                    } 
                } catch(e) {}
            },
            
            editAction(ts) { 
                try {
                    if(SyncEngine.isSyncing || isProcessing) return UI.showToast("系統處理中，請稍後操作");
                    const uData = getUserData(currentUser.uid);
                    let targetLog = null; let tDate = null;
                    
                    Object.keys(uData.habits[currentHabitId].logs).forEach(d => {
                        if (uData.habits[currentHabitId].logs[d].timestamp.toString() === ts.toString()) { targetLog = uData.habits[currentHabitId].logs[d]; tDate = d; }
                    });
                    
                    if (!targetLog) return; 
                    if (targetLog.isPruned) return UI.showToast("已封存的歷史足跡無法再修改囉！");
                    
                    const h = appTemplates[currentHabitId]; if (!h) return;
                    currentActionObj = h.actions.find(a => a.id === targetLog.actionId); if(!currentActionObj) return; 
                    
                    isEditMode = true; editTargetDate = tDate;
                    document.getElementById('input-book-title').value = targetLog.bookTitle; 
                    document.getElementById('input-value').value = targetLog.val === "..." ? "" : targetLog.val; 
                    document.getElementById('input-memo').value = targetLog.memo || ""; 
                    
                    this.setupModalUI(currentActionObj, false); UI.openModal('input-modal'); 
                } catch(e) {}
            },
            
            setupModalUI(act, isRec) { 
                document.getElementById('modal-title').innerHTML = isRec ? `⏳ 補救：${escapeHTML(act.label)}` : (isEditMode ? `✏️ 修改：${escapeHTML(act.label)}` : `✨ 紀錄：${escapeHTML(act.label)}`); 
                const iVal = document.getElementById('input-value'); 
                document.getElementById('label-title').innerHTML = `<div class="w-5 h-5 inline-block align-middle mr-1">${SVGs.icons.star}</div> 相關紀錄項目？(選填)`; 
                if(act.isQuote) { 
                    document.getElementById('label-value').innerHTML = `<div class="w-5 h-5 inline-block align-middle mr-1">${SVGs.ui.editPen}</div> 寫下精選內容吧：`; 
                    iVal.type = "text"; iVal.placeholder = "輸入內容..."; iVal.removeAttribute("min"); 
                } else { 
                    document.getElementById('label-value').innerHTML = `<div class="w-5 h-5 inline-block align-middle mr-1">${SVGs.ui.editPen}</div> 完成了多少${escapeHTML(act.unit)}呢？`; 
                    iVal.type = "number"; iVal.min = "1"; iVal.placeholder = "輸入數字(最少為1)"; 
                } 
            },
            
            saveAction(auto = false) {
                if(SyncEngine.isSyncing || isProcessing) return UI.showToast("系統處理中，請稍後操作");
                isProcessing = true; 
                try {
                    let title = "無標題", val = "1", memo = ""; 
                    if (!auto) { 
                        title = escapeHTML(document.getElementById('input-book-title').value.trim()) || title; 
                        val = document.getElementById('input-value').value.trim(); 
                        memo = escapeHTML(document.getElementById('input-memo').value.trim()); 
                    } 
                    
                    if(!currentActionObj.isQuote) { let num = parseInt(val, 10); val = (isNaN(num) || num < 1) ? "1" : num.toString(); } 
                    else { if(!val) val = "..."; }
                    
                    const uData = getUserData(currentUser.uid);
                    const habit = uData.habits[currentHabitId]; 
                    const targetKey = isEditMode ? editTargetDate : (recoveryDate || getTodayStr());
                    let pts = currentActionObj.points; let msgs = [];
                    
                    const todayD = new Date(); const day = todayD.getDay();
                    if (!isEditMode && !recoveryDate && (day === 0 || day === 6) && !uData.eggWeekend?.[targetKey]) {
                        if(!uData.eggWeekend) uData.eggWeekend = {};
                        uData.eggWeekend[targetKey] = true; pts += 20; msgs.push(`🎉 週末狂歡 +20`);
                    }

                    if(!isEditMode && !recoveryDate && !(day === 0 || day === 6)) { 
                        const h = todayD.getHours(); 
                        if(h < 7) { pts += 15; msgs.push(`☀️ 早鳥彩蛋 +15`); } else if(h >= 23) { pts += 10; msgs.push(`🌙 夜貓彩蛋 +10`); } 
                    }
                    
                    let isGoldenRain = false; 
                    if(!isEditMode && currentActionObj.isCrit && Math.random() < 0.15) { pts *= 2; AudioEngine.playCoin(); msgs.push(`🔥 爆擊雙倍`); } 
                    if(!isEditMode && Math.random() < 0.01) { pts += 50; isGoldenRain = true; msgs.push(`👑 黃金雨 +50`); }
                    
                    if(!isEditMode && currentActionObj.isMicro) {
                        let todayMicroCount = 0;
                        Object.keys(uData.habits).forEach(hId => {
                            if(uData.habits[hId].logs[targetKey] && !uData.habits[hId].logs[targetKey].isRecovery) {
                                const actDef = (appTemplates[hId]||{actions:[]}).actions?.find(a => a.id === uData.habits[hId].logs[targetKey].actionId);
                                if (actDef && actDef.isMicro) todayMicroCount++;
                            }
                        });
                        if (todayMicroCount === 2) { pts += 15; msgs.push(`🎁 微习惯寶箱 +15`); }
                    }
                    
                    if(!isEditMode && isFamilyBondActive(targetKey)) { pts = Math.round(pts * 1.2); msgs.push(`👨‍👩‍👦 全家 x1.2`); }
                    
                    if(!isEditMode) { 
                        uData.currentCoins += pts; uData.totalCoins += pts; habit.streak++; 
                        if(habit.streak % 30 === 0) habit.goldApples = (habit.goldApples||0) + 1; 
                    }
                    
                    habit.logs[targetKey] = { 
                        actionId: currentActionObj.id, 
                        timestamp: (isEditMode && habit.logs[targetKey]) ? habit.logs[targetKey].timestamp : Date.now(), 
                        pointsEarned: (isEditMode && habit.logs[targetKey]) ? habit.logs[targetKey].pointsEarned : pts, 
                        val: val, bookTitle: title, memo: memo, 
                        isRecovery: isEditMode ? habit.logs[targetKey].isRecovery : !!recoveryDate 
                    }; 
                    if(!isEditMode) habit.lastBookTitle = title;
                    
                    saveLocal(); UI.closeModal('input-modal'); this.cancelRecovery(); UI.renderAll(); editTargetDate = null;
                    
                    if(!isEditMode) { 
                        if(isGoldenRain) EasterEggs.triggerGoldenRain(); 
                        AudioEngine.playLevelUp(); UI.showToast(`獲得 ${pts} 金幣！ ` + msgs.join(' | ')); 
                    } else {
                        UI.showToast("紀錄修改成功！");
                    }
                } catch(e) { console.error(e); UI.showToast("打卡發生錯誤！"); } finally { setTimeout(() => isProcessing = false, 300); }
            },
            
            triggerDelete(ts) { 
                if(SyncEngine.isSyncing || isProcessing) return UI.showToast("系統處理中，請稍後操作");
                Confirm.show("刪除紀錄？", "這會扣回金幣與連勝喔！", "刪除", () => { 
                    isProcessing = true;
                    try {
                        const uData = getUserData(currentUser.uid); const habit = uData.habits[currentHabitId]; 
                        Object.keys(habit.logs).forEach(k => { 
                            if(habit.logs[k].timestamp.toString() === ts.toString()) { 
                                uData.currentCoins -= habit.logs[k].pointsEarned; uData.totalCoins -= habit.logs[k].pointsEarned; 
                                habit.streak = Math.max(0, habit.streak-1); delete habit.logs[k]; 
                            } 
                        }); 
                        saveLocal(); UI.renderAll(); UI.showToast("紀錄已刪除"); 
                    } finally { setTimeout(() => isProcessing = false, 300); }
                }); 
            },
            startRecovery(d) {
                if(SyncEngine.isSyncing || isProcessing) return UI.showToast("系統處理中，請稍後操作");
                const today = new Date(); const targetDate = new Date(d);
                if (targetDate > today) return UI.showToast("不能補救未來的日期喔！");
                
                Confirm.show("啟動補救模式？", `即將針對 ${d} 進行補打卡，是否繼續？`, "進入補救", () => {
                    recoveryDate = d; UI.renderAll(); UI.showToast("已進入補救模式！請選擇要補打卡的任務喵。");
                });
            }, 
            cancelRecovery() { recoveryDate = null; UI.renderAll(); }
        };

        const Shop = {
            historyLimit: 10,

                try {
                    ['shop','history','edit'].forEach(t => { const el = document.getElementById(`shop-tab-${t}`); if(el){ el.classList.toggle('bg-pink-500', tab === t); el.classList.toggle('text-white', tab === t); } });

            },
            buyItem(id) { 
                if(SyncEngine.isSyncing || isProcessing) return UI.showToast("系統處理中，請稍後操作");
                isProcessing = true;
                try {
                    const uData = getUserData(currentUser.uid); const i = shopItems.find(x=>x.id===id); 
                    if(!i || !uData) return;
                    if (i.reqLog) {
                        const today = getTodayStr(); const hasHabitToday = Object.values(uData.habits||{}).some(h => h?.logs?.[today] && !h.logs[today].isPruned);
                        if (!hasHabitToday) return UI.showToast("此獎品需要今天有打卡才能兌換喔！");
                    }
                    if(uData.currentCoins < i.cost) return UI.showToast("金幣不夠！"); 
                    uData.currentCoins -= i.cost; 
                    uData.shopHistory.unshift({ itemName: i.name, cost: i.cost, timestamp: Date.now() }); 
                    
                    saveLocal(); UI.renderAll(); this.renderItems(); AudioEngine.playCoin(); 
                    UI.showToast(`兌換「${i.name}」成功！`); Mascot.speak("換了禮物別太高興，明天還要繼續賺回來喵！");
                } finally { setTimeout(() => isProcessing = false, 300); }
            },
            renderHistory() { 
                try {
                    const u = getUserData(currentUser.uid); const display = u.shopHistory.slice(0, this.historyLimit); 
                    document.getElementById('shop-history-list').innerHTML = display.map(h => `
                        <div class="bg-gray-50 border-2 border-dashed border-gray-400 p-3 rounded-xl flex justify-between items-center">

                            <span class="font-black text-yellow-600 flex items-center gap-1">${h.cost} <div class="w-4 h-4">${SVGs.coin}</div></span>
                        </div>
                    `).join(''); 
                    const btn = document.getElementById('btn-load-more-shop'); if(btn) btn.classList.toggle('hidden', u.shopHistory.length <= this.historyLimit); 
                } catch(e){}
            },
            loadMoreHistory() { this.historyLimit += 10; this.renderHistory(); },
            renderEditList() { 
                try {
                    document.getElementById('shop-edit-list').innerHTML = shopItems.map(i => {
                        return `
                        <div class="bg-white border-2 border-gray-800 p-2 rounded-xl flex justify-between items-center shadow-sm">
                            <span class="font-black truncate max-w-[60%] inline-flex items-center gap-1"><div class="w-4 h-4">${SVGs.icons[i.icon] || SVGs.icons.star}</div> ${escapeHTML(i.name)} (${i.cost})</span>
                            <div class="flex gap-2">
                                <button onclick="Shop.editItem('${i.id}')" class="w-8 h-8 p-1.5 bg-blue-100 border border-gray-800 rounded hand-drawn-btn flex-shrink-0">${SVGs.ui.editPen}</button>
                                <button onclick="Shop.deleteItem('${i.id}')" class="w-8 h-8 p-1.5 bg-red-100 border border-gray-800 rounded hand-drawn-btn flex-shrink-0">${SVGs.ui.trash}</button>
                            </div>
                        </div>
                    `}).join(''); 
                } catch(e){}
            },
            openAddItem() { 
                this.tempIcon = 'star'; this.renderIconSelection(); this.editingId = null;
                document.getElementById('shop-e-title').innerText = "新增獎品";
                document.getElementById('shop-e-name').value = ''; document.getElementById('shop-e-cost').value = ''; 
                document.getElementById('shop-e-req').checked = false; 
                document.getElementById('shop-area-edit').classList.add('hidden'); document.getElementById('shop-area-form').classList.remove('hidden');

                    const flagKey = `reward_sent_${lastY}_${lastM}`;

                    if (dailyHabitData.systemFlags[flagKey]) return; 

                    if(navigator.onLine) {
                        try {
                            const result = await fetch(SyncEngine.API_URL + "?token=" + encodeURIComponent(myAuthToken)); const json = await result.json();

                    coinData.sort((a,b)=>b.value - a.value); countData.sort((a,b)=>b.value - a.value);
                    document.getElementById('stats-coin-pie').innerHTML = createPieChartSVG(coinData); document.getElementById('stats-count-pie').innerHTML = createPieChartSVG(countData);
                    document.getElementById('stats-coin-list').innerHTML = renderLeaderboard(coinData, '金幣'); document.getElementById('stats-count-list').innerHTML = renderLeaderboard(countData, '次');
                    document.getElementById('stats-active-days').innerText = activeDays.size; document.getElementById('stats-monthly-coins').innerText = coinData.reduce((s,x)=>s+x.value, 0);
                    document.getElementById('stats-best-habit').innerText = countData.length > 0 ? countData[0].title : '尚未開始';
                } catch(e) {}
            }
        };

        const Editor = {
            open() { UI.toggleHabitMenu(); this.renderHabitList(); UI.openModal('editor-modal'); },
            renderHabitList() {
                document.getElementById('editor-habit-list').innerHTML = Object.values(appTemplates).map(h => `
                    <div class="bg-white border-4 border-gray-800 rounded-xl p-3 flex justify-between items-center shadow-sm mb-3">
                        <div class="flex items-center gap-2 max-w-[70%]">
                            <div class="w-4 h-4 flex-shrink-0 rounded-full ${THEMES.find(t=>t.id===h.themeId)?.dot || 'bg-gray-400'} border-2 border-gray-800"></div>
                            <span class="font-black text-lg text-gray-800 truncate max-w-[120px] md:max-w-[250px]">${escapeHTML(h.title)}</span>
                        </div>
                        <button onclick="Editor.editHabit('${h.id}')" class="w-10 h-10 p-2 bg-blue-100 border-2 border-gray-800 rounded-lg hand-drawn-btn hover:bg-blue-200 flex-shrink-0 shadow-sm">${SVGs.ui.editPen}</button>
                    </div>
                `).join('');
                document.getElementById('editor-view-list').classList.remove('hidden'); document.getElementById('editor-view-detail').classList.add('hidden'); document.getElementById('editor-view-action').classList.add('hidden');
            },
            createNewHabit() { 
                const newId = "h_" + Date.now(); 
                appTemplates[newId] = { id: newId, title: "新習慣", themeId: "blue", roles: [{threshold:0, title:"新手"}], actions: [{ id: newId+"_a1", label: "任務一", unit: "次", icon: "star", points: 10 }] }; 
                users.forEach(u => { if(!dailyHabitData[u.uid].habits[newId]) dailyHabitData[u.uid].habits[newId] = { logs: {}, points: 0, streak: 0, goldApples: 0 }; }); 
                saveLocal(); this.editHabit(newId); 
            },
            deleteHabit() { 
                if(Object.keys(appTemplates).length <= 1) return UI.showToast("至少保留一個習慣！"); 
                Confirm.show("刪除習慣", "紀錄會跟著消失喔！", "刪除", () => { delete appTemplates[this.tempHabitId]; saveLocal(); currentHabitId = Object.keys(appTemplates)[0]; localStorage.setItem('lastHabitId_v13', currentHabitId); UI.closeModal('editor-modal'); UI.init(); }); 
            },
            editHabit(hId) { 
                const h = appTemplates[hId]; document.getElementById('editor-h-title').value = h.title; 
                this.tempRoles = JSON.parse(JSON.stringify(h.roles || [{threshold:0, title:"新手"}])); this.renderRolesEditor(); 
                document.getElementById('editor-h-colors').innerHTML = THEMES.map(t => `<button onclick="Editor.tempTheme='${t.id}'; Editor.renderThemeSelection()" class="w-8 h-8 rounded-full ${t.dot} border-4 ${h.themeId === t.id ? 'border-gray-800 scale-110 shadow-md' : 'border-white opacity-60'}" id="col-btn-${t.id}"></button>`).join(''); 
                this.tempTheme = h.themeId; this.tempHabitId = hId; this.renderActionListInEditor(h); 
                document.getElementById('editor-view-list').classList.add('hidden'); document.getElementById('editor-view-detail').classList.remove('hidden'); document.getElementById('editor-view-action').classList.add('hidden'); 
            },
            renderRolesEditor() { 
                document.getElementById('editor-h-roles').innerHTML = this.tempRoles.map((r, i) => `
                    <div class="flex gap-2 items-center mb-2 w-full box-border">
                        <span class="text-xs font-bold w-12 text-center flex-shrink-0">Lv.${i+1}</span>
                        <input type="text" value="${escapeHTML(r.title)}" onchange="Editor.tempRoles[${i}].title=this.value" class="flex-1 w-full box-border border-4 border-gray-800 rounded-lg p-1.5 font-bold text-xs min-w-0">
                        <input type="number" value="${r.threshold}" ${i===0?'disabled':''} onchange="Editor.tempRoles[${i}].threshold=parseInt(this.value)||0" class="w-16 flex-shrink-0 box-border border-4 border-gray-800 rounded-lg p-1.5 font-bold text-xs ${i===0?'bg-gray-200':''}" min="0">
                        ${i>0 ? `<button onclick="Editor.deleteRole(${i})" class="w-8 h-8 p-1.5 bg-red-100 border border-gray-800 rounded hand-drawn-btn flex items-center justify-center flex-shrink-0">${SVGs.ui.trash}</button>` : `<div class="w-8 flex-shrink-0"></div>`}
                    </div>
                `).join(''); 
            },
            addRole() { this.tempRoles.push({threshold: 50, title: "新稱號"}); this.renderRolesEditor(); },
            deleteRole(i) { Confirm.show("刪除階段", "確定要刪除這個身分階段嗎？", "刪除", () => { this.tempRoles.splice(i,1); this.renderRolesEditor(); }); },
            renderThemeSelection() { THEMES.forEach(t => { const btn = document.getElementById(`col-btn-${t.id}`); btn.className = `w-8 h-8 rounded-full ${t.dot} border-4 ${this.tempTheme === t.id ? 'border-gray-800 scale-110 shadow-md' : 'border-white opacity-60'}`; }); },
            renderActionListInEditor(h) { 
                const th = THEMES.find(t => t.id === this.tempTheme) || THEMES[0]; 
                document.getElementById('editor-h-actions').innerHTML = h.actions.map(a => `
                    <div onclick="Editor.editAction('${a.id}')" class="${th.btn} border-4 border-gray-800 rounded-xl p-3 flex items-center gap-3 cursor-pointer hand-drawn-btn mb-2">
                        <div class="w-8 h-8 flex-shrink-0">${SVGs.icons[a.icon] || SVGs.icons.star}</div>
                        <div class="flex-1 min-w-0"><p class="font-black text-sm truncate">${escapeHTML(a.label)}</p></div>
                        <div class="w-8 h-8 p-1.5 flex-shrink-0">${SVGs.ui.editPen}</div>
                    </div>
                `).join(''); 
            },
            saveHabit() { 
                const h = appTemplates[this.tempHabitId]; h.title = document.getElementById('editor-h-title').value.trim() || "未命名"; 
                h.themeId = this.tempTheme; h.roles = [...this.tempRoles].sort((a,b)=>a.threshold - b.threshold); 
                saveLocal(); UI.renderHabitDropdown(); if(currentHabitId === h.id) UI.switchHabit(h.id); this.renderHabitList(); UI.showToast("設定儲存成功！"); 
            },
            createAction() { 
                const h = appTemplates[this.tempHabitId]; const newId = this.tempHabitId + "_a" + Date.now(); 
                h.actions.push({ id: newId, label: "新任務", unit: "次", icon: "star", points: 10 }); saveLocal(); this.editAction(newId); 
            },
            deleteAction() { 
                const h = appTemplates[this.tempHabitId]; if(h.actions.length <= 1) return UI.showToast("至少保留一個任務！"); 
                Confirm.show("刪除任務", "確定刪除？", "刪除", () => { h.actions = h.actions.filter(a => a.id !== this.tempActionId); saveLocal(); this.editHabit(this.tempHabitId); }); 
            },
            editAction(aId) { 
                const h = appTemplates[this.tempHabitId]; const a = h.actions.find(act => act.id === aId); this.tempActionId = aId; 
                document.getElementById('editor-a-label').value = a.label; document.getElementById('editor-a-unit').value = a.unit || ""; 
                document.getElementById('editor-a-points').value = a.points; document.getElementById('editor-a-oneclick').checked = !!a.isOneClick; 
                document.getElementById('editor-a-micro').checked = !!a.isMicro; document.getElementById('editor-a-crit').checked = !!a.isCrit; 
                document.getElementById('editor-a-stack').value = a.stackingText || ""; 
                this.tempIcon = a.icon || "star"; this.renderIconSelection(); 
                document.getElementById('editor-view-detail').classList.add('hidden'); document.getElementById('editor-view-action').classList.remove('hidden'); 
            },
            renderIconSelection() { 
                document.getElementById('editor-a-icongrid').innerHTML = Object.keys(SVGs.icons).map(key => `<div onclick="Editor.tempIcon='${key}'; Editor.renderIconSelection()" class="w-10 h-10 p-1.5 border-4 rounded-xl cursor-pointer ${this.tempIcon === key ? 'border-gray-800 bg-yellow-200 scale-110 shadow-sm' : 'border-transparent bg-gray-100 opacity-60'}">${SVGs.icons[key]}</div>`).join(''); 
            },
            saveActionConfig() { 
                const h = appTemplates[this.tempHabitId]; const a = h.actions.find(act => act.id === this.tempActionId); 
                a.label = document.getElementById('editor-a-label').value.trim() || "按鈕"; a.unit = document.getElementById('editor-a-unit').value.trim(); 
                a.points = parseInt(document.getElementById('editor-a-points').value) || 1; a.icon = this.tempIcon; 
                a.isOneClick = document.getElementById('editor-a-oneclick').checked; a.isMicro = document.getElementById('editor-a-micro').checked; 
                a.isCrit = document.getElementById('editor-a-crit').checked; a.stackingText = document.getElementById('editor-a-stack').value.trim(); 
                if(a.isQuote) a.isOneClick = false; 
                saveLocal(); this.editHabit(this.tempHabitId); 
            }
        };

        const Radio = {
            pools: {}, shuffle(a) { let c=a.length, r; while(c!=0){ r=Math.floor(Math.random()*c); c--; [a[c],a[r]]=[a[r],a[c]]; } return a; },
            getLine() {
                try {
                    const uid = currentUser.uid; const uData = getUserData(uid); const streak = getOverallStreak(uid);
                    if(!this.pools[uid] || this.pools[uid].length === 0) {
                        let lines = [];
                        if (uid === 'user_dad') { lines = [`穩紮穩打，今天也是好榜樣！`, `連勝 ${streak} 天了，繼續保持！`, `【綠公主廣播】老公辛苦了，真帥氣！`, `口袋裡有 ${uData.currentCoins} 金幣。`, `一步一腳印，我們慢慢來。`, `全家人一起努力的感覺真好！`, `爸爸會一直當你們最堅強的後盾！`]; } 
                        else if (uid === 'user_mom') { lines = [`優雅地打卡了！給自己一個大大的擁抱～`, `已經累積 ${uData.totalCoins} 枚金幣了！`, `【狐狸廣播】老婆今天也閃閃發光！`, `今天也要像公主一樣優雅地完成任務喔！`, `我為你感到驕傲！`, `辛苦了，別忘了喝杯熱水休息一下。`]; } 
                        else { lines = [`跑這麼快，後面有狗在追喵？`, `連勝 ${streak} 天？算你有乖乖完成任務喵。`, `【狐狸廣播】阿蛇今天也超棒的！`, `口袋有 ${uData.currentCoins} 金幣了喵？`, `別一直戳喵，本喵很忙的！`, `看在你這麼努力打卡的份上，本喵就勉為其難誇獎你一下。`, `快點去打卡，本喵等著買罐罐呢！`]; }
                        const valid = customRadios.filter(r => r.target === 'all' || r.target === uid).map(r=>escapeHTML(r.text)); lines = lines.concat(valid); this.pools[uid] = this.shuffle(lines);
                    } 
                    return this.pools[uid].pop();
                } catch(e) { return "大家好喵！"; }
            },
            openCMS() { UI.toggleHabitMenu(); this.renderList(); UI.openModal('radio-modal'); },
            renderList() { 
                try {
                    document.getElementById('radio-list').innerHTML = customRadios.map(r => {
                        let labelClass = "bg-gray-200 text-gray-800"; let labelText = "所有人";
                        const targetUser = users.find(u=>u.uid===r.target);
                        if (r.target === 'user_son') { labelClass = "bg-purple-200 text-purple-800"; labelText = targetUser ? targetUser.name : '阿蛇'; }
                        else if (r.target === 'user_dad') { labelClass = "bg-orange-200 text-orange-800"; labelText = targetUser ? targetUser.name : '狐狸'; }
                        else if (r.target === 'user_mom') { labelClass = "bg-green-200 text-green-800"; labelText = targetUser ? targetUser.name : '綠公主'; }
                        else if (r.target !== 'all') { labelText = targetUser ? targetUser.name : '未知'; }
                        return `<div class="bg-white border-2 border-gray-800 rounded-xl p-3 mb-2 flex justify-between items-center shadow-sm">
                            <div class="max-w-[70%] flex flex-col items-start gap-1">
                                <span class="text-[10px] ${labelClass} px-2 py-0.5 rounded font-black">給${labelText}</span>
                                <p class="font-bold text-sm break-words w-full">${escapeHTML(r.text)}</p>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="Radio.editLine('${r.id}')" class="w-8 h-8 p-1.5 bg-blue-100 border border-gray-800 rounded hand-drawn-btn flex items-center justify-center">${SVGs.ui.editPen}</button>
                                <button onclick="Radio.deleteLine('${r.id}')" class="w-8 h-8 p-1 bg-red-100 border border-gray-800 rounded hand-drawn-btn flex items-center justify-center">${SVGs.ui.trash}</button>
                            </div>
                        </div>`
                    }).join(''); 
                } catch(e) {}
            },
            addLine() { 
                const text = document.getElementById('radio-new-text').value.trim(); const target = document.getElementById('radio-target').value; 
                if(!text) return; customRadios.push({id: "r_"+Date.now(), text, target}); saveLocal(); 
                document.getElementById('radio-new-text').value = ""; this.renderList(); this.pools = {}; UI.showToast("廣播台詞儲存成功！"); 
            },
            editLine(id) {
                const r = customRadios.find(x=>x.id===id); if(!r) return;
                document.getElementById('radio-new-text').value = r.text; document.getElementById('radio-target').value = r.target; customRadios = customRadios.filter(x=>x.id!==id); this.renderList();
            },
            deleteLine(id) { Confirm.show("刪除廣播", "確定刪除？", "刪除", () => { customRadios = customRadios.filter(r => r.id !== id); saveLocal(); this.pools = {}; this.renderList(); }); }
        };

        const Confirm = { 
            execute() { if(this.cb) { const action = this.cb; this.cb = null; action(); } UI.closeModal('generic-confirm-modal'); }, 
            show(t, d, bt, cb) { 
                document.getElementById('confirm-title').innerText = t; document.getElementById('confirm-desc').innerText = d; 
                document.getElementById('confirm-btn-do').innerText = bt; this.cb = cb; UI.openModal('generic-confirm-modal'); 
            } 
        };
        
        function getUserData(uid) { return dailyHabitData[uid]; }

        window.addEventListener('DOMContentLoaded', async () => { await initDB(); });
    </script>
</body>
</html>
