<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>原子習慣養成</title>
    
    <!-- 載入實體 manifest.json 確保 Android PWA 100% 成功 -->
    <link rel="manifest" href="./manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Marker Felt', 'Segoe UI', sans-serif;
            background-color: #fdf8f5; 
            background-image: radial-gradient(#fde2e4 3px, transparent 3px);
            background-size: 30px 30px;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        /* 📱 RWD 佈局與 iOS 底線防呆 */
        .app-wrapper { 
            max-width: 480px; margin: 0 auto; min-height: 100vh; 
            display: flex; flex-direction: column; transition: filter 0.3s; 
            padding-bottom: env(safe-area-inset-bottom);
        }
        @media (min-width: 768px) {
            .app-wrapper { max-width: 1024px; flex-direction: row; gap: 20px; padding: 20px; min-height: calc(100vh - 40px); }
            .panel-left { flex: 5; display: flex; flex-direction: column; background: #fff; border-radius: 2rem; border: 4px solid #1f2937; box-shadow: 8px 8px 0px #1f2937; position: relative; z-index: 10; }
            .panel-right { flex: 4; display: flex; flex-direction: column; background: #fff; border-radius: 2rem; border: 4px solid #1f2937; box-shadow: 8px 8px 0px #1f2937; padding: 20px; overflow-y: auto; }
            body { padding: 0; }
            #main-header { border-top-left-radius: calc(2rem - 4px); border-top-right-radius: calc(2rem - 4px); }
        }
        @media (max-width: 767px) {
            .app-wrapper { background-color: #ffffff; border-left: 4px solid #1f2937; border-right: 4px solid #1f2937; overflow-x: hidden; }
            .panel-right { padding: 20px; padding-top: 0; flex: 1; }
        }

        /* 手繪風元件 */
        .hand-drawn-border { border: 4px solid #1f2937; border-radius: 24px 12px 24px 12px; box-shadow: 4px 4px 0px #1f2937; transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .hand-drawn-btn:active { transform: translate(4px, 4px) !important; box-shadow: 0px 0px 0px #1f2937 !important; }
        .bg-theme-transition { transition: background 0.5s ease-in-out; border-bottom: 4px solid #1f2937; }

        /* 【深度除錯】強制所有輸入框字體為 16px，防止 iOS 點擊輸入時強迫放大破壞版面 */
        input, textarea, select, [contenteditable="true"] {
            font-size: 16px !important;
        }

        /* 動畫區 */
        @keyframes float { 0%, 100% { transform: translateY(0) rotate(-2deg); } 50% { transform: translateY(-8px) rotate(2deg); } }
        .mascot-float { animation: float 3s infinite ease-in-out; }
        @keyframes popIn { 0% { transform: scale(0.8) rotate(5deg); opacity: 0; } 100% { transform: scale(1) rotate(0deg); opacity: 1; } }
        .pop-in { animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes fireFlicker { 0%, 100% { transform: scale(1) rotate(-2deg); } 50% { transform: scale(1.1) rotate(2deg); } }
        .fire-anim { animation: fireFlicker 1s infinite alternate; }
        @keyframes heartRise { 0% { transform: translateY(0) scale(0.5); opacity: 1; } 100% { transform: translateY(-60px) scale(1.5); opacity: 0; } }
        .heart-float { animation: heartRise 1s ease-out forwards; position: absolute; pointer-events: none; z-index: 100; }
        @keyframes sway { 0%, 100% { transform: rotate(-1.5deg); } 50% { transform: rotate(1.5deg); } }
        .tree-sway { animation: sway 4s ease-in-out infinite; transform-origin: 100px 140px; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .loading-spin { animation: spin 1s linear infinite; }

        /* 👆 滑動切換專屬動畫 (Slide & Fade) */
        @keyframes slideInRight { from { transform: translateX(30px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes slideInLeft { from { transform: translateX(-30px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .anim-slide-in-right { animation: slideInRight 0.25s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; }
        .anim-slide-in-left { animation: slideInLeft 0.25s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; }

        /* 黃金雨 */
        #golden-rain { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; display: none; background: rgba(0,0,0,0.4); }
        .falling-coin { position: absolute; top: -50px; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(110vh) rotate(720deg); } }

        /* 滾動條隱藏與自訂 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }

        /* 信箱防呆 placeholder */
        #mail-input[contenteditable="true"]:empty:before { content: attr(placeholder); color: #9ca3af; pointer-events: none; display: block; }
        
        /* 液體裝瓶動畫 */
        .liquid-fill { transition: height 1s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    </style>
</head>
<body class="antialiased text-gray-800">

    <!-- ☁️ 雲端同步鎖定遮罩 -->
    <div id="sync-overlay" class="fixed inset-0 z-[200] bg-white/80 backdrop-blur-md flex flex-col items-center justify-center transition-opacity duration-500 hidden opacity-0">
        <div class="w-20 h-24 mb-4 relative mascot-float" id="sync-mascot-img"></div>
        <p class="font-black text-xl text-blue-600 tracking-widest drop-shadow-sm" id="sync-msg">連線雲端手帳中...</p>
        <p class="text-gray-500 font-bold text-sm mt-2">全家人的足跡同步中</p>
    </div>
    
    <div id="golden-rain"></div>

                            <button onclick="SyncEngine.manualSync()" class="w-full text-left px-3 py-2 bg-blue-50 hover:bg-blue-100 rounded-lg font-black text-blue-700 flex items-center gap-2 transition-colors">
                                <div class="w-4 h-4" id="icon-sync-btn"></div> 立即同步雲端

                            <button onclick="Radio.openCMS()" class="w-full text-left px-3 py-2 bg-gray-100 hover:bg-gray-200 rounded-lg font-black text-gray-800 flex items-center gap-2 transition-colors">
                                <div class="w-4 h-4" id="icon-radio-btn"></div> 廣播台管理

                    </div>

                        <div class="flex items-center gap-1" title="手邊金幣">

        </div>

            </div>
            
            <div class="text-right mt-6 opacity-40 hover:opacity-100 transition-opacity cursor-pointer flex items-center justify-end gap-1" onclick="EasterEggs.triggerAuthorEgg()">

    </div>

        async function initDB() {
            const cloudSync = await SyncEngine.pull();
            
            const savedTpl = localStorage.getItem('appTemplates_v13') || localStorage.getItem('appTemplates_v12');
            if (savedTpl) {
                appTemplates = JSON.parse(savedTpl);

                };

            dailyHabitData = JSON.parse(localStorage.getItem('daily-habit-v13')) || JSON.parse(localStorage.getItem('daily-habit-v12')) || {};
            
            users.forEach(u => {
                if (!dailyHabitData[u.uid]) {
                    dailyHabitData[u.uid] = { totalCoins: 0, currentCoins: 0, mails: [], habits: {}, shopHistory: [] };
                }
                if (!dailyHabitData[u.uid].mails) dailyHabitData[u.uid].mails = [];
                if (!dailyHabitData[u.uid].shopHistory) dailyHabitData[u.uid].shopHistory = [];
                
                Object.keys(appTemplates).forEach(hId => { 
                    if(!dailyHabitData[u.uid].habits) dailyHabitData[u.uid].habits = {};
                    if(!dailyHabitData[u.uid].habits[hId]) {
                        dailyHabitData[u.uid].habits[hId] = { logs: {}, points: 0, streak: 0, goldApples: 0 }; 
                    }

                        dailyHabitData[u.uid].habits[hId].logs = {};
                    }
                });
            });

            localStorage.setItem('daily-habit-v13', JSON.stringify(dailyHabitData));

        function pruneAllData() {
            const cutOffTime = Date.now() - (40 * 24 * 60 * 60 * 1000); 
            users.forEach(u => {
                const uData = dailyHabitData[u.uid];
                if(uData.mails) uData.mails = uData.mails.slice(0, 50);
                if(uData.shopHistory) uData.shopHistory = uData.shopHistory.slice(0, 50);
                
                Object.keys(uData.habits || {}).forEach(hId => {
                    const logs = uData.habits[hId]?.logs || {};
                    Object.keys(logs).forEach(dateStr => {
                        if(logs[dateStr] && logs[dateStr].timestamp < cutOffTime) {
                            logs[dateStr].isPruned = true;
                            delete logs[dateStr].val;
                            delete logs[dateStr].memo;
                            delete logs[dateStr].bookTitle;
                        }
                    });
                });
            });
        }

        function saveLocal() {
            pruneAllData();
            localStorage.setItem('appTemplates_v13', JSON.stringify(appTemplates));
            localStorage.setItem('shopItems_v13', JSON.stringify(shopItems));
            localStorage.setItem('customRadios_v13', JSON.stringify(customRadios));
            localStorage.setItem('daily-habit-v13', JSON.stringify(dailyHabitData));
            
            if(!SyncEngine.isSyncing) {
                SyncEngine.push().catch(e => console.error("Background sync push failed:", e));
            } else {
                SyncEngine.syncPending = true;

            syncPending: false, // 貯列標記，確保打卡不會漏傳

                try {
                    const response = await fetch(this.API_URL);
                    const result = await response.json();
                    if (result.status === 'success' && result.data) {
                        const cloudData = result.data;
                        if(Object.keys(cloudData).length === 0) return 'empty'; 
                        
                        const rawDaily = cloudData['daily-habit-v13'] || cloudData['daily-habit-v12'] || {};
                        users.forEach(u => {
                            if (!rawDaily[u.uid]) {
                                rawDaily[u.uid] = { totalCoins: 0, currentCoins: 0, mails: [], habits: {}, shopHistory: [] };
                            }
                            if (!rawDaily[u.uid].mails) rawDaily[u.uid].mails = [];
                            if (!rawDaily[u.uid].shopHistory) rawDaily[u.uid].shopHistory = [];
                            if (!rawDaily[u.uid].habits) rawDaily[u.uid].habits = {};
                        });
                        
                        if (cloudData.appTemplates_v13) localStorage.setItem('appTemplates_v13', JSON.stringify(cloudData.appTemplates_v13));
                        if (cloudData.shopItems_v13) localStorage.setItem('shopItems_v13', JSON.stringify(cloudData.shopItems_v13));
                        if (cloudData.customRadios_v13) localStorage.setItem('customRadios_v13', JSON.stringify(cloudData.customRadios_v13));
                        localStorage.setItem('daily-habit-v13', JSON.stringify(rawDaily));
                        return 'success';
                    }
                } catch (e) { console.error("Pull failed", e); }
                return 'error';

                };

                    await fetch(this.API_URL, {
                        method: 'POST', mode: 'no-cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ updates })
                    });
                } catch (e) {} 
                finally {

                        this.push();

        // 🎵 音效引擎
        // ==========================================
        const AudioEngine = {
            muted: false, ctx: null,
            init() { 
                if(this.ctx) return; 
                try { window.AudioContext = window.AudioContext || window.webkitAudioContext; this.ctx = new AudioContext(); } catch(e) {} 
            },
            toggleMute() { 
                this.muted = !this.muted; 
                document.getElementById('mute-btn').innerHTML = `<div class="w-6 h-6">${this.muted ? SVGs.ui.mute : SVGs.ui.speaker}</div>`; 
                if(!this.muted) { this.init(); if(this.ctx.state === 'suspended') this.ctx.resume(); this.playCoin(); } 
            },
            playCoin() { 
                if(this.muted || !this.ctx) return; 
                const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain(); 
                osc.type = 'square'; osc.frequency.setValueAtTime(987, this.ctx.currentTime); osc.frequency.setValueAtTime(1318, this.ctx.currentTime + 0.1); 
                gain.gain.setValueAtTime(0.1, this.ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.4); 
                osc.connect(gain); gain.connect(this.ctx.destination); osc.start(); osc.stop(this.ctx.currentTime + 0.4); 
            },
            playLevelUp() { 
                if(this.muted || !this.ctx) return; 
                const notes = [523, 659, 783, 1046]; 
                notes.forEach((freq, i) => { 
                    const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain(); 
                    osc.type = 'square'; osc.frequency.value = freq; 
                    gain.gain.setValueAtTime(0.1, this.ctx.currentTime + i*0.1); gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + i*0.1 + 0.3); 
                    osc.connect(gain); gain.connect(this.ctx.destination); osc.start(this.ctx.currentTime + i*0.1); osc.stop(this.ctx.currentTime + i*0.1 + 0.3); 
                }); 
            },
            playAnimal(type) { 
                if(this.muted || !this.ctx) return; 
                const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain(); 
                if(type === 'cat') { 
                    osc.type = 'sine'; osc.frequency.setValueAtTime(600, this.ctx.currentTime); osc.frequency.exponentialRampToValueAtTime(300, this.ctx.currentTime + 0.4); 
                    gain.gain.setValueAtTime(0.1, this.ctx.currentTime); gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 0.4); 
                } else if (type === 'fox') { 
                    osc.type = 'triangle'; osc.frequency.setValueAtTime(800, this.ctx.currentTime); osc.frequency.linearRampToValueAtTime(1000, this.ctx.currentTime + 0.1); 
                    gain.gain.setValueAtTime(0.1, this.ctx.currentTime); gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 0.1); 
                } else { 
                    osc.type = 'sine'; osc.frequency.setValueAtTime(1200, this.ctx.currentTime); osc.frequency.linearRampToValueAtTime(1600, this.ctx.currentTime + 0.3); 
                    gain.gain.setValueAtTime(0.05, this.ctx.currentTime); gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 0.3); 
                } 
                osc.connect(gain); gain.connect(this.ctx.destination); osc.start(); osc.stop(this.ctx.currentTime + 0.4); 
            },
            playPurr() { 
                if(this.muted || !this.ctx) return; 
                const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain(); 
                osc.type = 'sawtooth'; osc.frequency.value = 40; 
                gain.gain.setValueAtTime(0.2, this.ctx.currentTime); gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 2); 
                osc.connect(gain); gain.connect(this.ctx.destination); osc.start(); osc.stop(this.ctx.currentTime + 2); 
            },
            vibrate(pattern) { if(navigator.vibrate) navigator.vibrate(pattern); }
        };

        const SwipeDetector = {
            init() {
                this.bindGlobalSwipe();
                this.bindModalSwipes();
            },
            playSlide(elementId, dir) {
                if(!dir) return;
                const el = document.getElementById(elementId);
                if(!el) return;
                el.classList.remove('anim-slide-in-left', 'anim-slide-in-right');
                void el.offsetWidth; // 觸發瀏覽器重繪
                el.classList.add(dir > 0 ? 'anim-slide-in-right' : 'anim-slide-in-left');
            },
            bindGlobalSwipe() {
                let startX = 0, startY = 0;
                const wrapper = document.querySelector('.app-wrapper');
                wrapper.addEventListener('touchstart', e => {
                    startX = e.changedTouches[0].screenX; startY = e.changedTouches[0].screenY;
                }, {passive: true});
                wrapper.addEventListener('touchend', e => {
                    if (!document.getElementById('modals-container').innerText.includes('hidden') && Array.from(document.getElementById('modals-container').children).some(m => !m.classList.contains('hidden'))) return;
                    
                    let endX = e.changedTouches[0].screenX, endY = e.changedTouches[0].screenY;
                    let dx = endX - startX, dy = endY - startY;
                    
                    if(Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 2) {
                        const currentIndex = users.findIndex(u => u.uid === currentUser.uid);
                        if(dx > 0) { // 向右滑 -> 上一個角色 (從左邊滑入)
                            let prev = currentIndex - 1 < 0 ? users.length - 1 : currentIndex - 1;
                            UI.switchUser(users[prev].uid, false, -1);
                        } else { // 向左滑 -> 下一個角色 (從右邊滑入)
                            let next = currentIndex + 1 >= users.length ? 0 : currentIndex + 1;
                            UI.switchUser(users[next].uid, false, 1);
                        }
                    }
                }, {passive: true});
            },
            bindModalSwipes() {
                const attachSwipe = (modalId, tabsArray, switchFn) => {
                    let startX = 0, startY = 0;
                    const modal = document.getElementById(modalId);
                    if(!modal) return;
                    modal.addEventListener('touchstart', e => {
                        startX = e.changedTouches[0].screenX; startY = e.changedTouches[0].screenY;
                    }, {passive: true});
                    modal.addEventListener('touchend', e => {
                        // 絕對防護：輸入框、信箱內文區域滑動時，不切換
                        if(['INPUT', 'TEXTAREA', 'SELECT'].includes(e.target.tagName) || e.target.closest('[contenteditable="true"]') || e.target.closest('#mail-write-area')) return;
                        
                        let endX = e.changedTouches[0].screenX, endY = e.changedTouches[0].screenY;
                        let dx = endX - startX, dy = endY - startY;
                        if(Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 2) {
                            let activeIdx = tabsArray.findIndex(t => document.getElementById(`${t.prefix}-tab-${t.id}`).classList.contains(t.activeClass));

                            if(dx > 0) { 
                                if(activeIdx > 0) switchFn(tabsArray[activeIdx - 1].id, -1);
                            } else { 
                                if(activeIdx < tabsArray.length - 1) switchFn(tabsArray[activeIdx + 1].id, 1);
                            }
                        }
                    }, {passive: true});
                };

        // ==========================================

        function getTodayStr() { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
        function formatFootprintDate(ts) {
            const d = new Date(ts); const m = d.getMonth() + 1; const day = d.getDate(); const w = ['日','一','二','三','四','五','六'][d.getDay()];
            let h = d.getHours(); const min = d.getMinutes().toString().padStart(2, '0'); const ampm = h >= 12 ? '下午' : '上午';
            if (h > 12) h -= 12; if (h === 0) h = 12; return `${m}月${day}日(${w}) ${ampm}${h.toString().padStart(2, '0')}:${min}`;
        }
        
        function escapeHTML(str) {
            if (!str) return "";
            return str.replace(/[&<>"']/g, function(m) {
                switch (m) {
                    case '&': return '&amp;';
                    case '<': return '&lt;';
                    case '>': return '&gt;';
                    case '"': return '&quot;';
                    case "'": return '&#39;';
                }
            });
        }
        
        function getOverallStreak(uid) {
            const uData = getUserData(uid); let streak = 0; const checkDate = new Date();
            const formatD = (date) => `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
            let hasToday = Object.values(uData.habits||{}).some(h => h?.logs?.[formatD(checkDate)]);
            
            if (!hasToday) { 
                checkDate.setDate(checkDate.getDate() - 1); 
                if (!Object.values(uData.habits||{}).some(h => h?.logs?.[formatD(checkDate)])) return 0; 
            } else { streak++; checkDate.setDate(checkDate.getDate() - 1); }
            
            while(true) { 
                if (Object.values(uData.habits||{}).some(h => h?.logs?.[formatD(checkDate)])) { streak++; checkDate.setDate(checkDate.getDate() - 1); } 
                else { break; } 
            } 
            return streak;
        }
        
        function isFamilyBondActive(dateStr) {
            const checkDate = dateStr ? new Date(dateStr) : new Date();
            checkDate.setDate(checkDate.getDate() - 1); 
            const yStr = `${checkDate.getFullYear()}-${String(checkDate.getMonth()+1).padStart(2,'0')}-${String(checkDate.getDate()).padStart(2,'0')}`;
            return users.every(u => Object.values(getUserData(u.uid)?.habits||{}).some(h => h?.logs?.[yStr] && !h.logs[yStr].isPruned));
        }
        
        function getIdentityBadge(hId, uid) {
            const hData = getUserData(uid)?.habits?.[hId]; if(!hData) return "新手";
            const logsCount = Object.keys(hData.logs||{}).length; const roles = appTemplates[hId]?.roles || [{threshold:0, title:"新手"}];
            let currentRole = roles[0].title; const sortedRoles = [...roles].sort((a,b)=>a.threshold - b.threshold);
            for(let r of sortedRoles) { if(logsCount >= r.threshold) currentRole = r.title; } 
            return currentRole;
        }

        function createPieChartSVG(data) {
            let total = data.reduce((sum, d) => sum + d.value, 0);
            if (total === 0) return `<div class="w-full h-full bg-gray-100 rounded-full border-4 border-gray-800 flex items-center justify-center text-xs font-bold text-gray-400">無數據</div>`;
            
            let gradientStr = "";
            let currentAngle = 0;
            data.forEach((d, i) => {
                let percentage = (d.value / total) * 100;
                gradientStr += `${d.color} ${currentAngle}% ${currentAngle + percentage}%`;
                if (i < data.length - 1) gradientStr += ", ";
                currentAngle += percentage;
            });
            return `<div class="w-full h-full rounded-full border-4 border-gray-800 shadow-[4px_4px_0px_#1f2937]" style="background: conic-gradient(${gradientStr});"></div>`;
        }

        function getMonthlyCoinsForUser(uid, currentM, currentY) {
            const u = getUserData(uid);
            let coins = 0;
            Object.keys(u.habits||{}).forEach(hId => {
                Object.keys(u.habits[hId]?.logs||{}).forEach(dateStr => {
                    const d = new Date(dateStr);
                    if(d.getMonth() === currentM && d.getFullYear() === currentY) {
                        coins += u.habits[hId].logs[dateStr].pointsEarned;
                    }
                });
            });
            return coins;
        }

            renderCalendar() {
                const uData = getUserData(currentUser.uid); let html = '';
                for (let i = 6; i >= 0; i--) {
                    const d = new Date(); d.setDate(d.getDate() - i); 
                    const dateStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
                    const isToday = i === 0; 
                    
                    let isActive = false;
                    let lastLog = null;
                    
                    Object.values(uData.habits||{}).forEach(h => {
                        if(h?.logs?.[dateStr] && !h.logs[dateStr].isPruned) {
                            isActive = true;
                            if(!lastLog || h.logs[dateStr].timestamp > lastLog.timestamp) {
                                lastLog = h.logs[dateStr];
                                lastLog.hId = h.id; 
                            }
                        }
                    });
                    
                    let statusClass = "bg-white border-4 border-gray-300 text-gray-400";
                    let iconContent = d.getDate(); let clickAction = "";
                    
                    if (isActive) { 
                        let charStr = "✓";
                        if(lastLog) {
                            if(lastLog.bookTitle) charStr = lastLog.bookTitle.charAt(0);
                            else {
                                let act = null;
                                Object.values(appTemplates).forEach(t => {
                                    let a = t.actions.find(aa=>aa.id===lastLog.actionId);
                                    if(a) act = a;
                                });
                                if(act) charStr = act.label.charAt(0);
                            }
                        }
                        statusClass = "bg-green-400 border-4 border-gray-800 text-gray-900 shadow-[2px_2px_0px_#1f2937] scale-110"; 
                        iconContent = `<span class="font-black text-lg">${escapeHTML(charStr)}</span>`; 
                    } 
                    else if (!isToday) { 
                        statusClass = "bg-gray-100 border-4 border-dashed border-gray-400 text-gray-500 cursor-pointer hover:bg-gray-200"; 
                        iconContent = `<div class="w-4 h-4">${SVGs.ui.history}</div>`; 
                        clickAction = `onclick="Logic.startRecovery('${dateStr}')"`; 
                    }
                    
                    html += `
                        <div class="flex flex-col items-center gap-1.5" ${clickAction}>

        // ==========================================
        // 🧠 核心操作邏輯
        // ==========================================
        const Logic = {
            openActionModal(aId) { 
                const today = getTodayStr(); 
                const targetDateStr = recoveryDate || today;
                
                if(getUserData(currentUser.uid)?.habits?.[currentHabitId]?.logs?.[targetDateStr]) {
                    return UI.showToast(recoveryDate ? "補救的這天已經有打卡紀錄囉！" : "今天打過卡囉！可以修改歷史足跡喵"); 
                }

                if(SyncEngine.isSyncing || isProcessing) return UI.showToast("系統處理中，請稍後操作");
                
                const h = appTemplates[currentHabitId];
                const act = h.actions.find(a=>a.id===aId); 
                
                if(act.isOneClick && !recoveryDate) { 
                    currentActionObj = act; isEditMode = false; editTargetDate = null; this.saveAction(true); 
                } else { 
                    currentActionObj = act; isEditMode = false; editTargetDate = null; 
                    document.getElementById('input-book-title').value = getUserData(currentUser.uid)?.habits?.[currentHabitId]?.lastBookTitle || ""; 
                    document.getElementById('input-value').value = ""; 
                    document.getElementById('input-memo').value = ""; 
                    this.setupModalUI(act, !!recoveryDate); 
                    UI.openModal('input-modal'); 
                } 
            },
            
            editAction(ts) { 
                if(SyncEngine.isSyncing || isProcessing) return UI.showToast("系統處理中，請稍後操作");
                
                const uData = getUserData(currentUser.uid);
                let targetLog = null; let tDate = null;
                
                Object.keys(uData.habits[currentHabitId].logs).forEach(d => {
                    if (uData.habits[currentHabitId].logs[d].timestamp.toString() === ts.toString()) { 
                        targetLog = uData.habits[currentHabitId].logs[d]; tDate = d; 
                    }
                });
                
                if (!targetLog) return; 
                if (targetLog.isPruned) return UI.showToast("已封存的歷史足跡無法再修改囉！");
                
                currentActionObj = appTemplates[currentHabitId].actions.find(a => a.id === targetLog.actionId); 
                if(!currentActionObj) return; 
                
                isEditMode = true; editTargetDate = tDate;
                document.getElementById('input-book-title').value = targetLog.bookTitle; 
                document.getElementById('input-value').value = targetLog.val === "..." ? "" : targetLog.val;

                } else { 
                    document.getElementById('label-value').innerHTML = `<div class="w-5 h-5 inline-block align-middle mr-1">${SVGs.ui.editPen}</div> 完成了多少${escapeHTML(act.unit)}呢？`; 
                    iVal.type = "number"; iVal.min = "1"; iVal.placeholder = "輸入數字(最少為1)"; 
                }

            saveAction(auto = false) {
                if(SyncEngine.isSyncing || isProcessing) return UI.showToast("系統處理中，請稍後操作");
                isProcessing = true; 
                
                try {
                    let title = "無標題", val = "1", memo = ""; 
                    if (!auto) { 
                        title = escapeHTML(document.getElementById('input-book-title').value.trim()) || title; 
                        val = document.getElementById('input-value').value.trim(); 
                        memo = escapeHTML(document.getElementById('input-memo').value.trim()); 
                    } 
                    
                    if(!currentActionObj.isQuote) { 
                        let num = parseInt(val, 10); val = (isNaN(num) || num < 1) ? "1" : num.toString(); 
                    } else { if(!val) val = "..."; }
                    
                    const uData = getUserData(currentUser.uid);
                    const habit = uData.habits[currentHabitId]; 
                    const targetKey = isEditMode ? editTargetDate : (recoveryDate || getTodayStr());
                    
                    let pts = currentActionObj.points; let msgs = [];
                    
                    if(!isEditMode && !recoveryDate) { 
                        const h = new Date().getHours(); 
                        if(h < 7) { pts += 15; msgs.push(`☀️ 早鳥彩蛋 +15`); } 
                        else if(h >= 23) { pts += 10; msgs.push(`🌙 夜貓彩蛋 +10`); } 
                    }
                    
                    let isGoldenRain = false; 
                    if(!isEditMode && currentActionObj.isCrit && Math.random() < 0.15) { 
                        pts *= 2; AudioEngine.playCoin(); msgs.push(`🔥 爆擊雙倍`); 
                    } 
                    if(!isEditMode && Math.random() < 0.01) { 
                        pts += 50; isGoldenRain = true; msgs.push(`👑 黃金雨 +50`); 
                    }
                    
                    if(!isEditMode && isFamilyBondActive(targetKey)) { 
                        pts = Math.round(pts * 1.2); msgs.push(`👨‍👩‍👦 全家 x1.2`); 
                    }
                    
                    if(!isEditMode) { 
                        uData.currentCoins += pts; uData.totalCoins += pts; habit.streak++; 
                        if(habit.streak % 30 === 0) habit.goldApples = (habit.goldApples||0) + 1; 
                    }
                    
                    habit.logs[targetKey] = { 
                        actionId: currentActionObj.id, 
                        timestamp: (isEditMode && habit.logs[targetKey]) ? habit.logs[targetKey].timestamp : Date.now(), 
                        pointsEarned: (isEditMode && habit.logs[targetKey]) ? habit.logs[targetKey].pointsEarned : pts, 
                        val: val, bookTitle: title, memo: memo, 
                        isRecovery: isEditMode ? habit.logs[targetKey].isRecovery : !!recoveryDate 
                    }; 
                    if(!isEditMode) habit.lastBookTitle = title;
                    
                    saveLocal(); 
                    
                    UI.closeModal('input-modal'); 
                    this.cancelRecovery(); 
                    UI.renderAll(); 
                    editTargetDate = null;
                    
                    if(!isEditMode) { 
                        if(isGoldenRain) EasterEggs.triggerGoldenRain(); 
                        AudioEngine.playLevelUp(); UI.showToast(`獲得 ${pts} 金幣！ ` + msgs.join(' | ')); 
                    } else {
                        UI.showToast("紀錄修改成功！");
                    }
                } finally {
                    setTimeout(() => isProcessing = false, 300);
                }
            },
            
            triggerDelete(ts) { 
                if(SyncEngine.isSyncing || isProcessing) return UI.showToast("系統處理中，請稍後操作");
                Confirm.show("刪除紀錄？", "這會扣回金幣與連勝喔！", "刪除", () => { 
                    isProcessing = true;
                    try {
                        const uData = getUserData(currentUser.uid);
                        const habit = uData.habits[currentHabitId]; 
                        Object.keys(habit.logs).forEach(k => { 
                            if(habit.logs[k].timestamp.toString() === ts.toString()) { 
                                uData.currentCoins -= habit.logs[k].pointsEarned; 
                                uData.totalCoins -= habit.logs[k].pointsEarned; 
                                habit.streak = Math.max(0, habit.streak-1); 
                                delete habit.logs[k]; 
                            } 
                        }); 
                        saveLocal(); UI.renderAll(); UI.showToast("紀錄已刪除"); 
                    } finally {
                        setTimeout(() => isProcessing = false, 300);
                    }
                }); 
            },
            startRecovery(d) { recoveryDate = d; UI.renderAll(); }, 
            cancelRecovery() { recoveryDate = null; UI.renderAll(); }
        };

                const currentLevel = safeTotal % 1000;
                const percent = Math.max(5, (currentLevel / 1000) * 100); 
                
                let treasuresHtml = '';
                for(let i=0; i<cycle; i++) {
                    const icons = ['star', 'moon', 'chest', 'crown2'];
                    const chosen = icons[i % icons.length];
                    treasuresHtml += `<div class="w-8 h-8 pop-in" style="animation-delay: ${i*0.1}s">${SVGs.icons[chosen]}</div>`;
                }
                document.getElementById('cycle-treasures').innerHTML = treasuresHtml;

                    const liquid = document.getElementById('jar-liquid-level');
                    if(liquid) liquid.style.height = `${percent}%`;
                }, 100);
                
                const daysInMonth = new Date(this.viewYear, this.viewMonth + 1, 0).getDate();
                
                const now = new Date();
                let monthLabelStr = `${this.viewMonth + 1}月`;
                if (this.viewYear === now.getFullYear() && this.viewMonth === now.getMonth()) {

                } else if (this.viewYear !== now.getFullYear()) {
                    monthLabelStr = `${this.viewYear}年${this.viewMonth + 1}月`;
                }

                    const dateStr = `${this.viewYear}-${String(this.viewMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
                    let hasLog = false;
                    
                    Object.keys(u.habits||{}).forEach(hId => {
                        if(u.habits[hId]?.logs?.[dateStr] && !u.habits[hId].logs[dateStr].isPruned) hasLog = true;
                    });
                    
                    if(hasLog) {
                        stickersHtml += `<div class="w-full aspect-square p-1 md:p-2 border-2 border-gray-800 rounded-lg transform rotate-${Math.floor(Math.random()*6)-3} hover:scale-110 cursor-pointer bg-yellow-100 shadow-sm flex items-center justify-center" title="${dateStr}"><div class="w-[80%] h-[80%]">${SVGs[currentUser.svgKey]}</div></div>`;

                let lmScores = users.map(u => ({ uid: u.uid, score: getMonthlyCoinsForUser(u.uid, lastMonth, lastYear) }));
                lmScores.sort((a,b)=>b.score - a.score);
                const lmWinnerId = (lmScores[0].score > 0) ? lmScores[0].uid : null;
                
                let mScores = users.map(u => ({ uid: u.uid, score: getMonthlyCoinsForUser(u.uid, currentM, currentY) }));
                mScores.sort((a,b)=>b.score - a.score);
                
                document.getElementById('tree-nodes-container').innerHTML = users.map((u,i) => {
                    const myRank = mScores.findIndex(x=>x.uid === u.uid) + 1;
                    const myScore = mScores.find(x=>x.uid === u.uid).score;
                    
                    let h = Math.min(80, 10 + (myScore / 10)); 
                    let left = 20 + i * 25 + (Math.random() * 10 - 5);
                    
                    let crownHtml = (u.uid === lmWinnerId) ? `<div class="absolute -top-4 -right-2 w-6 h-6 transform rotate-12">${SVGs.crown.replace('CROWN_COLOR', '#fde047')}</div>` : '';
                    
                    return `<div class="absolute w-12 h-12 hover:scale-125 transition-transform cursor-pointer drop-shadow-md" style="bottom:${h}%; left:${left}%" onclick="Report.clickTreeCharacter('${myRank}', '${u.name}')">

                }).join(''); 
            },
            
            clickTreeCharacter(rank, name) {
                let quotes = [];
                if(rank === '1') quotes = ["我在最上面！大家快上來！", "風景真好喵～", "繼續保持第一名！"];
                else if(rank === '2') quotes = ["我快追上了！別跑！", "就差一點點了！", "第二名也很棒喔！"];
                else quotes = ["等等我呀～", "我會在下面支持你們的！", "慢慢爬，總會到的！"];
                
                const chosen = quotes[Math.floor(Math.random() * quotes.length)];
                UI.showToast(`${name}: ${chosen}`);
            },
            
            renderStats() {
                const u = getUserData(currentUser.uid); const currentM = new Date().getMonth(); const currentY = new Date().getFullYear();
                let coinData = []; let countData = []; let activeDays = new Set();
                
                Object.keys(u.habits||{}).forEach(hId => {
                    let c = 0, p = 0;
                    Object.keys(u.habits[hId]?.logs||{}).forEach(dateStr => {
                        const d = new Date(dateStr);
                        if(d.getMonth() === currentM && d.getFullYear() === currentY) {
                            c++; p += u.habits[hId].logs[dateStr].pointsEarned; activeDays.add(dateStr);
                        }
                    });
                    if (c > 0 || p > 0) {
                        const hConfig = appTemplates[hId];
                        if (hConfig) {
                            const theme = THEMES.find(t=>t.id===hConfig.themeId);
                            coinData.push({ title: hConfig.title, value: p, color: theme.hex }); countData.push({ title: hConfig.title, value: c, color: theme.hex });
                        }
                    }
                });
                
                coinData.sort((a,b)=>b.value - a.value); countData.sort((a,b)=>b.value - a.value);
                document.getElementById('stats-coin-pie').innerHTML = createPieChartSVG(coinData); document.getElementById('stats-count-pie').innerHTML = createPieChartSVG(countData);
                document.getElementById('stats-coin-list').innerHTML = renderLeaderboard(coinData, '金幣'); document.getElementById('stats-count-list').innerHTML = renderLeaderboard(countData, '次');
                document.getElementById('stats-active-days').innerText = activeDays.size; document.getElementById('stats-monthly-coins').innerText = coinData.reduce((s,x)=>s+x.value, 0);
                document.getElementById('stats-best-habit').innerText = countData.length > 0 ? countData[0].title : '尚未開始';
            }
        };

        // ==========================================
        // ⚙️ 系統習慣管理介面
        // ==========================================
        const Editor = {
            open() { UI.toggleHabitMenu(); this.renderHabitList(); UI.openModal('editor-modal'); },
            renderHabitList() {
                document.getElementById('editor-habit-list').innerHTML = Object.values(appTemplates).map(h => `
                    <div class="bg-white border-4 border-gray-800 rounded-xl p-3 flex justify-between items-center shadow-sm mb-3">
                        <div class="flex items-center gap-2 max-w-[70%]">
                            <div class="w-4 h-4 flex-shrink-0 rounded-full ${THEMES.find(t=>t.id===h.themeId)?.dot || 'bg-gray-400'} border-2 border-gray-800"></div>
                            <span class="font-black text-lg text-gray-800 truncate max-w-[120px] md:max-w-[250px]">${escapeHTML(h.title)}</span>
                        </div>
                        <button onclick="Editor.editHabit('${h.id}')" class="w-10 h-10 p-2 bg-blue-100 border-2 border-gray-800 rounded-lg hand-drawn-btn hover:bg-blue-200 flex-shrink-0 shadow-sm">${SVGs.ui.editPen}</button>
                    </div>
                `).join('');
                document.getElementById('editor-view-list').classList.remove('hidden'); document.getElementById('editor-view-detail').classList.add('hidden'); document.getElementById('editor-view-action').classList.add('hidden');
            },
            createNewHabit() { 
                const newId = "h_" + Date.now(); 
                appTemplates[newId] = { id: newId, title: "新習慣", themeId: "blue", roles: [{threshold:0, title:"新手"}], actions: [{ id: newId+"_a1", label: "任務一", unit: "次", icon: "star", points: 10 }] }; 
                users.forEach(u => { if(!dailyHabitData[u.uid].habits[newId]) dailyHabitData[u.uid].habits[newId] = { logs: {}, points: 0, streak: 0, goldApples: 0 }; }); 
                saveLocal(); this.editHabit(newId); 
            },
            deleteHabit() { 
                if(Object.keys(appTemplates).length <= 1) return UI.showToast("至少保留一個習慣！"); 
                Confirm.show("刪除習慣", "紀錄會跟著消失喔！", "刪除", () => { 
                    delete appTemplates[this.tempHabitId]; saveLocal(); currentHabitId = Object.keys(appTemplates)[0]; localStorage.setItem('lastHabitId_v13', currentHabitId); UI.closeModal('editor-modal'); UI.init(); 
                }); 
            },
            editHabit(hId) { 
                const h = appTemplates[hId]; document.getElementById('editor-h-title').value = h.title; 
                this.tempRoles = JSON.parse(JSON.stringify(h.roles || [{threshold:0, title:"新手"}])); this.renderRolesEditor(); 
                document.getElementById('editor-h-colors').innerHTML = THEMES.map(t => `<button onclick="Editor.tempTheme='${t.id}'; Editor.renderThemeSelection()" class="w-8 h-8 rounded-full ${t.dot} border-4 ${h.themeId === t.id ? 'border-gray-800 scale-110 shadow-md' : 'border-white opacity-60'}" id="col-btn-${t.id}"></button>`).join(''); 
                this.tempTheme = h.themeId; this.tempHabitId = hId; this.renderActionListInEditor(h); 
                document.getElementById('editor-view-list').classList.add('hidden'); document.getElementById('editor-view-detail').classList.remove('hidden'); document.getElementById('editor-view-action').classList.add('hidden'); 
            },
            renderRolesEditor() { 
                document.getElementById('editor-h-roles').innerHTML = this.tempRoles.map((r, i) => `
                    <div class="flex gap-2 items-center mb-2 w-full box-border">
                        <span class="text-xs font-bold w-12 text-center">Lv.${i+1}</span>
                        <input type="text" value="${escapeHTML(r.title)}" onchange="Editor.tempRoles[${i}].title=this.value" class="flex-1 w-full box-border border-4 border-gray-800 rounded-lg p-1.5 font-bold text-xs">
                        <input type="number" value="${r.threshold}" ${i===0?'disabled':''} onchange="Editor.tempRoles[${i}].threshold=parseInt(this.value)||0" class="w-16 box-border border-4 border-gray-800 rounded-lg p-1.5 font-bold text-xs ${i===0?'bg-gray-200':''}" min="0">
                        ${i>0 ? `<button onclick="Editor.deleteRole(${i})" class="w-8 h-8 p-1.5 bg-red-100 border border-gray-800 rounded hand-drawn-btn flex items-center justify-center flex-shrink-0">${SVGs.ui.trash}</button>` : `<div class="w-8 flex-shrink-0"></div>`}
                    </div>
                `).join(''); 
            },
            addRole() { this.tempRoles.push({threshold: 50, title: "新稱號"}); this.renderRolesEditor(); },
            deleteRole(i) { Confirm.show("刪除階段", "確定要刪除這個身分階段嗎？", "刪除", () => { this.tempRoles.splice(i,1); this.renderRolesEditor(); }); },
            renderThemeSelection() { THEMES.forEach(t => { const btn = document.getElementById(`col-btn-${t.id}`); btn.className = `w-8 h-8 rounded-full ${t.dot} border-4 ${this.tempTheme === t.id ? 'border-gray-800 scale-110 shadow-md' : 'border-white opacity-60'}`; }); },
            renderActionListInEditor(h) { 
                const th = THEMES.find(t => t.id === this.tempTheme) || THEMES[0]; 
                document.getElementById('editor-h-actions').innerHTML = h.actions.map(a => `
                    <div onclick="Editor.editAction('${a.id}')" class="${th.btn} border-4 border-gray-800 rounded-xl p-3 flex items-center gap-3 cursor-pointer hand-drawn-btn mb-2">
                        <div class="w-8 h-8">${SVGs.icons[a.icon] || SVGs.icons.star}</div>
                        <div class="flex-1"><p class="font-black text-sm">${escapeHTML(a.label)}</p></div>
                        <div class="w-8 h-8 p-1.5">${SVGs.ui.editPen}</div>
                    </div>
                `).join(''); 
            },
            saveHabit() { 
                const h = appTemplates[this.tempHabitId]; h.title = document.getElementById('editor-h-title').value.trim() || "未命名"; 
                h.themeId = this.tempTheme; h.roles = [...this.tempRoles].sort((a,b)=>a.threshold - b.threshold); 
                saveLocal(); UI.renderHabitDropdown(); if(currentHabitId === h.id) UI.switchHabit(h.id); this.renderHabitList(); UI.showToast("設定儲存成功！"); 
            },
            createAction() { 
                const h = appTemplates[this.tempHabitId]; const newId = this.tempHabitId + "_a" + Date.now(); 
                h.actions.push({ id: newId, label: "新任務", unit: "次", icon: "star", points: 10 }); saveLocal(); this.editAction(newId); 
            },
            deleteAction() { 
                const h = appTemplates[this.tempHabitId]; if(h.actions.length <= 1) return UI.showToast("至少保留一個任務！"); 
                Confirm.show("刪除任務", "確定刪除？", "刪除", () => { h.actions = h.actions.filter(a => a.id !== this.tempActionId); saveLocal(); this.editHabit(this.tempHabitId); }); 
            },
            editAction(aId) { 
                const h = appTemplates[this.tempHabitId]; const a = h.actions.find(act => act.id === aId); this.tempActionId = aId; 
                document.getElementById('editor-a-label').value = a.label; document.getElementById('editor-a-unit').value = a.unit || ""; 
                document.getElementById('editor-a-points').value = a.points; document.getElementById('editor-a-oneclick').checked = !!a.isOneClick; 
                document.getElementById('editor-a-micro').checked = !!a.isMicro; document.getElementById('editor-a-crit').checked = !!a.isCrit; 
                document.getElementById('editor-a-stack').value = a.stackingText || ""; 
                this.tempIcon = a.icon || "star"; this.renderIconSelection(); 
                document.getElementById('editor-view-detail').classList.add('hidden'); document.getElementById('editor-view-action').classList.remove('hidden'); 
            },
            renderIconSelection() { 
                document.getElementById('editor-a-icongrid').innerHTML = Object.keys(SVGs.icons).map(key => `
                    <div onclick="Editor.tempIcon='${key}'; Editor.renderIconSelection()" class="w-10 h-10 p-1.5 border-4 rounded-xl cursor-pointer ${this.tempIcon === key ? 'border-gray-800 bg-yellow-200 scale-110 shadow-sm' : 'border-transparent bg-gray-100 opacity-60'}">
                        ${SVGs.icons[key]}
                    </div>
                `).join(''); 
            },
            saveActionConfig() { 
                const h = appTemplates[this.tempHabitId]; const a = h.actions.find(act => act.id === this.tempActionId); 
                a.label = document.getElementById('editor-a-label').value.trim() || "按鈕"; a.unit = document.getElementById('editor-a-unit').value.trim(); 
                a.points = parseInt(document.getElementById('editor-a-points').value) || 1; a.icon = this.tempIcon; 
                a.isOneClick = document.getElementById('editor-a-oneclick').checked; a.isMicro = document.getElementById('editor-a-micro').checked; 
                a.isCrit = document.getElementById('editor-a-crit').checked; a.stackingText = document.getElementById('editor-a-stack').value.trim(); 
                if(a.isQuote) a.isOneClick = false; 
                saveLocal(); this.editHabit(this.tempHabitId); 
            }
        };

        // ==========================================
        // 📻 廣播台 CMS
        // ==========================================
        const Radio = {
            pools: {}, 
            shuffle(a) { let c=a.length, r; while(c!=0){ r=Math.floor(Math.random()*c); c--; [a[c],a[r]]=[a[r],a[c]]; } return a; },
            getLine() {
                const uid = currentUser.uid; const uData = getUserData(uid); const streak = getOverallStreak(uid);
                if(!this.pools[uid] || this.pools[uid].length === 0) {
                    let lines = [];
                    if (uid === 'user_dad') { 
                        lines = [
                            `穩紮穩打，今天也是好榜樣！`, 
                            `連勝 ${streak} 天了，繼續保持！`, 
                            `【綠公主廣播】老公辛苦了，真帥氣！`, 
                            `口袋裡有 ${uData.currentCoins} 金幣。`,
                            `一步一腳印，我們慢慢來。`,
                            `全家人一起努力的感覺真好！`,
                            `爸爸會一直當你們最堅強的後盾！`
                        ]; 
                    } 
                    else if (uid === 'user_mom') { 
                        lines = [
                            `優雅地打卡了！給自己一個大大的擁抱～`, 
                            `已經累積 ${uData.totalCoins} 枚金幣了！`, 
                            `【狐狸廣播】老婆今天也閃閃發光！`,
                            `今天也要像公主一樣優雅地完成任務喔！`,
                            `我為你感到驕傲！`,
                            `辛苦了，別忘了喝杯熱水休息一下。`
                        ]; 
                    } 
                    else { 
                        lines = [
                            `跑這麼快，後面有狗在追喵？`, 
                            `連勝 ${streak} 天？算你有乖乖完成任務喵。`, 
                            `【狐狸廣播】阿蛇今天也超棒的！`, 
                            `口袋有 ${uData.currentCoins} 金幣了喵？`,
                            `別一直戳喵，本喵很忙的！`,
                            `看在你這麼努力打卡的份上，本喵就勉為其難誇獎你一下。`,
                            `快點去打卡，本喵等著買罐罐呢！`
                        ]; 
                    }
                    const valid = customRadios.filter(r => r.target === 'all' || r.target === uid).map(r=>r.text); 
                    lines = lines.concat(valid); this.pools[uid] = this.shuffle(lines);
                } 
                return this.pools[uid].pop();
            },
            openCMS() { UI.toggleHabitMenu(); this.renderList(); UI.openModal('radio-modal'); },
            renderList() { 
                document.getElementById('radio-list').innerHTML = customRadios.map(r => {
                    let labelClass = "bg-gray-200 text-gray-800"; let labelText = "所有人";
                    const targetUser = users.find(u=>u.uid===r.target);
                    if (r.target === 'user_son') { labelClass = "bg-purple-200 text-purple-800"; labelText = targetUser ? targetUser.name : '阿蛇'; }
                    else if (r.target === 'user_dad') { labelClass = "bg-orange-200 text-orange-800"; labelText = targetUser ? targetUser.name : '狐狸'; }
                    else if (r.target === 'user_mom') { labelClass = "bg-green-200 text-green-800"; labelText = targetUser ? targetUser.name : '綠公主'; }
                    else if (r.target !== 'all') { labelText = targetUser ? targetUser.name : '未知'; }
                    
                    return `
                    <div class="bg-white border-2 border-gray-800 rounded-xl p-3 mb-2 flex justify-between items-center shadow-sm">
                        <div class="max-w-[70%] flex flex-col items-start gap-1">
                            <span class="text-[10px] ${labelClass} px-2 py-0.5 rounded font-black">給${labelText}</span>
                            <p class="font-bold text-sm break-words w-full">${escapeHTML(r.text)}</p>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="Radio.editLine('${r.id}')" class="w-8 h-8 p-1.5 bg-blue-100 border border-gray-800 rounded hand-drawn-btn flex items-center justify-center">${SVGs.ui.editPen}</button>
                            <button onclick="Radio.deleteLine('${r.id}')" class="w-8 h-8 p-1 bg-red-100 border border-gray-800 rounded hand-drawn-btn flex items-center justify-center">${SVGs.ui.trash}</button>
                        </div>
                    </div>`
                }).join(''); 
            },
            addLine() { 
                const text = document.getElementById('radio-new-text').value.trim(); const target = document.getElementById('radio-target').value; 
                if(!text) return; customRadios.push({id: "r_"+Date.now(), text, target}); saveLocal(); 
                document.getElementById('radio-new-text').value = ""; this.renderList(); this.pools = {}; UI.showToast("廣播台詞儲存成功！"); 
            },
            editLine(id) {
                const r = customRadios.find(x=>x.id===id); if(!r) return;
                document.getElementById('radio-new-text').value = r.text;
                document.getElementById('radio-target').value = r.target;
                customRadios = customRadios.filter(x=>x.id!==id);
                this.renderList();
            },
            deleteLine(id) { Confirm.show("刪除廣播", "確定刪除？", "刪除", () => { customRadios = customRadios.filter(r => r.id !== id); saveLocal(); this.pools = {}; this.renderList(); }); }
        };

        const Confirm = { 
            execute() { 
                if(this.cb) { const action = this.cb; this.cb = null; action(); } 
                UI.closeModal('generic-confirm-modal'); 
            }, 
            show(t, d, bt, cb) { 
                document.getElementById('confirm-title').innerText = t; 
                document.getElementById('confirm-desc').innerText = d; 
                document.getElementById('confirm-btn-do').innerText = bt; 
                this.cb = cb; UI.openModal('generic-confirm-modal'); 
            } 
        };
        
        function getUserData(uid) { return dailyHabitData[uid]; }

        // ==========================================
        // 🚀 系統啟動入口
        // ==========================================
        window.addEventListener('DOMContentLoaded', async () => { 
            await initDB(); 
            UI.init(); 
        });
        
    </script>
</body>
</html>
