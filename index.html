    <script>
        // ==========================================
        // ☁️ 雲端同步引擎 (GAS 無痛背景連線 + 防衝突)
        // ==========================================
        const SyncEngine = {
            API_URL: "https://script.google.com/macros/s/AKfycbyISODCgqeOUH0ZtIf2kf3VmdmOzaF1PLoNd9ZQQ19j40FQZcYP1GVqb72uYqyf7NJb3w/exec",
            isSyncing: false,
            
            async pull() {
                try {
                    const response = await fetch(this.API_URL);
                    const result = await response.json();
                    if (result.status === 'success' && result.data) {
                        const cloudData = result.data;
                        if(Object.keys(cloudData).length === 0) return 'empty'; // 創世初始化
                        
                        // 資料清洗防呆 (Sanitization)
                        const rawDaily = cloudData['daily-habit-v13'] || cloudData['daily-habit-v12'] || {};
                        users.forEach(u => {
                            if (!rawDaily[u.uid]) rawDaily[u.uid] = { totalCoins: 0, currentCoins: 0, mails: [], habits: {}, shopHistory: [] };
                            if (!rawDaily[u.uid].mails) rawDaily[u.uid].mails = [];
                            if (!rawDaily[u.uid].shopHistory) rawDaily[u.uid].shopHistory = [];
                        });
                        
                        if (cloudData.appTemplates_v13) localStorage.setItem('appTemplates_v13', JSON.stringify(cloudData.appTemplates_v13));
                        if (cloudData.shopItems_v13) localStorage.setItem('shopItems_v13', JSON.stringify(cloudData.shopItems_v13));
                        if (cloudData.customRadios_v13) localStorage.setItem('customRadios_v13', JSON.stringify(cloudData.customRadios_v13));
                        localStorage.setItem('daily-habit-v13', JSON.stringify(rawDaily));
                        return 'success';
                    }
                } catch (e) { console.error("Pull failed", e); }
                return 'error';
            },

            async push() {
                if (this.isSyncing) return;
                this.isSyncing = true;
                const updates = {
                    appTemplates_v13: JSON.parse(localStorage.getItem('appTemplates_v13')||"{}"),
                    shopItems_v13: JSON.parse(localStorage.getItem('shopItems_v13')||"[]"),
                    customRadios_v13: JSON.parse(localStorage.getItem('customRadios_v13')||"[]"),
                    'daily-habit-v13': JSON.parse(localStorage.getItem('daily-habit-v13')||"{}")
                };
                try {
                    await fetch(this.API_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ updates })
                    });
                } catch (e) { console.error("Push failed", e); }
                this.isSyncing = false;
            },

            async manualSync() {
                if(this.isSyncing) return;
                document.getElementById('sync-overlay').classList.remove('hidden');
                document.getElementById('sync-overlay').style.opacity = '1';
                document.getElementById('sync-msg').innerText = '🔄 雲端下載驗證中...';
                
                const status = await this.pull();
                
                if (status === 'success' || status === 'empty') { 
                    initDB(); UI.renderAll(); 
                    document.getElementById('sync-msg').innerText = '✅ 資料已同步，執行上傳...';
                    await this.push();
                    UI.showToast("資料同步完成！");
                } else { 
                    document.getElementById('sync-msg').innerText = '❌ 連線失敗，保護機制啟動';
                    UI.showToast("網路異常，已暫停同步。"); 
                }
                
                setTimeout(() => {
                    document.getElementById('sync-overlay').style.opacity = '0';
                    setTimeout(() => document.getElementById('sync-overlay').classList.add('hidden'), 500);
                }, 1000);
            }
        };

        // ==========================================
        // 🎵 音效、PWA 與 彩蛋系統
        // ==========================================
        const AudioEngine = {
            muted: false, ctx: null,
            init() { if(this.ctx) return; try { window.AudioContext = window.AudioContext || window.webkitAudioContext; this.ctx = new AudioContext(); } catch(e) {} },
            toggleMute() { this.muted = !this.muted; document.getElementById('mute-btn').innerText = this.muted ? "🔇" : "🔊"; if(!this.muted) { this.init(); if(this.ctx.state === 'suspended') this.ctx.resume(); this.playCoin(); } },
            playCoin() { if(this.muted || !this.ctx) return; const osc = this.ctx.createOscillator(), gain = this.ctx.createGain(); osc.type = 'square'; osc.frequency.setValueAtTime(987, this.ctx.currentTime); osc.frequency.setValueAtTime(1318, this.ctx.currentTime + 0.1); gain.gain.setValueAtTime(0.1, this.ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.4); osc.connect(gain); gain.connect(this.ctx.destination); osc.start(); osc.stop(this.ctx.currentTime + 0.4); },
            playLevelUp() { if(this.muted || !this.ctx) return; const notes = [523, 659, 783, 1046]; notes.forEach((freq, i) => { const osc = this.ctx.createOscillator(), gain = this.ctx.createGain(); osc.type = 'square'; osc.frequency.value = freq; gain.gain.setValueAtTime(0.1, this.ctx.currentTime + i*0.1); gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + i*0.1 + 0.3); osc.connect(gain); gain.connect(this.ctx.destination); osc.start(this.ctx.currentTime + i*0.1); osc.stop(this.ctx.currentTime + i*0.1 + 0.3); }); },

                    try {

        };

        // ==========================================
        // 📊 日期處理與圖表函式
        // ==========================================
        function getTodayStr() { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
        function formatFootprintDate(ts) {
            const d = new Date(ts); const m = d.getMonth() + 1; const day = d.getDate(); const w = ['日','一','二','三','四','五','六'][d.getDay()];
            let h = d.getHours(); const min = d.getMinutes().toString().padStart(2, '0'); const ampm = h >= 12 ? '下午' : '上午';
            if (h > 12) h -= 12; if (h === 0) h = 12; return `${m}月${day}日(${w}) ${ampm}${h.toString().padStart(2, '0')}:${min}`;
        }
        function getOverallStreak(uid) {
            const uData = getUserData(uid); let streak = 0; const checkDate = new Date();
            const formatD = (date) => `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
            let hasToday = Object.values(uData.habits||{}).some(h => h?.logs?.[formatD(checkDate)]);
            if (!hasToday) { checkDate.setDate(checkDate.getDate() - 1); if (!Object.values(uData.habits||{}).some(h => h?.logs?.[formatD(checkDate)])) return 0; } 
            else { streak++; checkDate.setDate(checkDate.getDate() - 1); }
            while(true) { if (Object.values(uData.habits||{}).some(h => h?.logs?.[formatD(checkDate)])) { streak++; checkDate.setDate(checkDate.getDate() - 1); } else break; } 
            return streak;
        }
        function isFamilyBondActive() {
            const yDate = new Date(); yDate.setDate(yDate.getDate() - 1); const yStr = `${yDate.getFullYear()}-${String(yDate.getMonth()+1).padStart(2,'0')}-${String(yDate.getDate()).padStart(2,'0')}`;
            return users.every(u => Object.values(getUserData(u.uid)?.habits||{}).some(h => h?.logs?.[yStr]));
        }
        function getIdentityBadge(hId, uid) {
            const hData = getUserData(uid)?.habits?.[hId]; if(!hData) return "新手";
            const logsCount = Object.keys(hData.logs||{}).length;
            const roles = appTemplates[hId]?.roles || [{threshold:0, title:"新手"}];
            let currentRole = roles[0].title; const sortedRoles = [...roles].sort((a,b)=>a.threshold - b.threshold);
            for(let r of sortedRoles) { if(logsCount >= r.threshold) currentRole = r.title; } return currentRole;
        }

        function createPieChartSVG(data) {
            let total = data.reduce((sum, d) => sum + d.value, 0);
            if (total === 0) return `<div class="w-full h-full bg-gray-100 rounded-full border-4 border-gray-800 flex items-center justify-center text-xs font-bold text-gray-400">無數據</div>`;
            let svg = `<svg viewBox="0 0 31.83 31.83" class="w-full h-full pie-chart">`;
            let offset = 0;
            data.forEach(d => {
                let slice = (d.value / total) * 100;
                svg += `<circle cx="15.915" cy="15.915" r="15.915" fill="none" stroke="${d.color}" stroke-width="31.83" stroke-dasharray="${slice} 100" stroke-dashoffset="${-offset}"></circle>`;
                offset += slice;
            });
            return svg + `</svg>`;
        }
        function renderLeaderboard(data, unit) {

                else if(i===2) crown = `<div class="w-5 h-5 ml-1 flex-shrink-0">${SVGs.crown.replace('CROWN_COLOR', '#fdba74')}</div>`;
                return `<div class="flex justify-between items-center bg-gray-50 border-2 border-dashed border-gray-300 p-2 rounded-lg mb-1">
                    <div class="flex items-center gap-1.5 truncate"><div class="w-3 h-3 rounded-full border border-gray-800 flex-shrink-0" style="background:${d.color}"></div><span class="font-black text-sm text-gray-800 truncate max-w-[120px] md:max-w-[160px]">${d.title}</span>${crown}</div>
                    <span class="font-black text-sm text-gray-800 flex-shrink-0">${d.value} ${unit}</span></div>`;

                if(!isEditMode) habit.lastBookTitle = title;
                saveLocal(); UI.closeModal('input-modal'); UI.renderAll(); editTargetDate = null;
                if(!isEditMode) { if(isGoldenRain) EasterEggs.triggerGoldenRain(); AudioEngine.playLevelUp(); UI.showToast(`獲得 ${pts} 金幣！ ` + msgs.join(' | ')); } else UI.showToast("紀錄修改成功！");
            },
            triggerDelete(ts) { 
                if(SyncEngine.isSyncing) return UI.showToast("資料同步中，請稍後");
                Confirm.show("刪除紀錄？", "這會扣回金幣與連勝喔！", "刪除", () => { const uData = getUserData(currentUser.uid), habit = uData.habits[currentHabitId]; Object.keys(habit.logs).forEach(k => { if(habit.logs[k].timestamp.toString() === ts.toString()) { uData.currentCoins -= habit.logs[k].pointsEarned; uData.totalCoins -= habit.logs[k].pointsEarned; habit.streak = Math.max(0, habit.streak-1); delete habit.logs[k]; } }); saveLocal(); UI.renderAll(); UI.showToast("紀錄已刪除"); }); 
            },
            startRecovery(d) { recoveryDate = d; UI.showToast("補救模式已啟動"); UI.renderCalendar(); },
            cancelRecovery() { recoveryDate = null; UI.renderCalendar(); }
        };

        const Shop = {
            historyLimit: 10,
            open() { UI.init(); this.historyLimit = 10; this.switchTab('shop'); UI.openModal('shop-modal'); },
            switchTab(tab) { ['shop','history','edit'].forEach(t => document.getElementById(`shop-tab-${t}`).classList.toggle('bg-pink-500', tab === t)); document.getElementById('shop-area-shop').classList.toggle('hidden', tab !== 'shop'); document.getElementById('shop-area-history').classList.toggle('hidden', tab !== 'history'); document.getElementById('shop-area-edit').classList.toggle('hidden', tab !== 'edit'); this.renderItems(); },
            renderItems() { const uData = getUserData(currentUser.uid); document.getElementById('shop-current-coins').innerText = uData.currentCoins; document.getElementById('shop-items-list').innerHTML = shopItems.map(i => `<div class="bg-white border-4 border-gray-800 p-3 rounded-xl flex justify-between items-center"><span class="font-black truncate max-w-[150px]">${i.name}</span><button onclick="Shop.buyItem('${i.id}')" class="bg-yellow-200 border-2 border-gray-800 px-3 py-1 font-black rounded-lg flex-shrink-0">${i.cost}</button></div>`).join(''); this.renderHistory(); this.renderEditList(); },
            buyItem(id) { 
                if(SyncEngine.isSyncing) return UI.showToast("資料同步中，請稍後");
                const uData = getUserData(currentUser.uid), i = shopItems.find(x=>x.id===id); if(uData.currentCoins < i.cost) return UI.showToast("金幣不夠！"); uData.currentCoins -= i.cost; uData.shopHistory.unshift({ itemName: i.name, cost: i.cost, timestamp: Date.now() }); saveLocal(); UI.renderAll(); UI.closeModal('shop-modal'); AudioEngine.playCoin(); UI.showToast(`兌換「${i.name}」成功！`); document.getElementById('mascot-speech').innerText = "換了禮物別太高興，明天還要繼續賺回來喵！"; 
            },
            renderHistory() { const u = getUserData(currentUser.uid); const display = u.shopHistory.slice(0, this.historyLimit); document.getElementById('shop-history-list').innerHTML = display.map(h => `<div class="bg-gray-50 border-2 border-dashed border-gray-400 p-3 rounded-xl flex justify-between"><div><p class="font-black">${h.itemName}</p><p class="text-xs">${formatFootprintDate(h.timestamp)}</p></div><span class="font-black text-red-500">-${h.cost}</span></div>`).join(''); document.getElementById('btn-load-more-shop').classList.toggle('hidden', u.shopHistory.length <= this.historyLimit); },
            loadMoreHistory() { this.historyLimit += 10; this.renderHistory(); },
            renderEditList() { document.getElementById('shop-edit-list').innerHTML = shopItems.map(i => `<div class="bg-white border-2 border-gray-800 p-2 rounded-xl flex justify-between"><span class="font-black truncate max-w-[60%]">${i.name} (${i.cost})</span><button onclick="Shop.deleteItem('${i.id}')" class="w-8 h-8 p-1.5 bg-red-100 border border-gray-800 rounded hand-drawn-btn flex-shrink-0">${SVGs.trash}</button></div>`).join(''); },
            openAddItem() { this.tempShopId = null; document.getElementById('shop-area-edit').classList.add('hidden'); document.getElementById('shop-area-form').classList.remove('hidden'); },
            saveItem() { const n = document.getElementById('shop-e-name').value, c = parseInt(document.getElementById('shop-e-cost').value); if(!n || !c) return UI.showToast("資料不齊全！"); shopItems.push({ id: "s_"+Date.now(), name: n, cost: c, reqLog: false, icon: 'star' }); saveLocal(); document.getElementById('shop-area-form').classList.add('hidden'); document.getElementById('shop-area-edit').classList.remove('hidden'); this.renderItems(); UI.showToast("獎品已上架！"); },
            deleteItem(id) { Confirm.show("刪除獎品", "確定下架？", "刪除", () => { shopItems = shopItems.filter(i=>i.id !== id); saveLocal(); this.renderItems(); }); }
        };

        const Mail = {
            mailLimit: 10,
            switchTab(tab) { this.renderMails(); },
            sendMail() { 
                if(SyncEngine.isSyncing) return UI.showToast("資料同步中，請稍後");
                const c = document.getElementById('mail-input').value.trim(), t = document.getElementById('mail-target-select').value; if(!c) return; const other = getUserData(t); other.mails.unshift({ id: Date.now().toString(), from: currentUser.name, fromAvatarKey: currentUser.svgKey, content: c, timestamp: Date.now(), isRead: false }); saveLocal(); UI.showToast("信件已寄出！"); this.switchTab('read'); document.getElementById('mail-input').value=""; 
            },
            renderMails() { const u = getUserData(currentUser.uid); document.getElementById('mail-list').innerHTML = u.mails.slice(0, this.mailLimit).map(m => `<div class="bg-white border-4 border-gray-800 p-4 rounded-xl shadow-sm"><div class="flex justify-between items-start mb-2"><p class="font-black text-blue-600">來自 ${m.from}</p><button onclick="Mail.deleteMail('${m.id}')" class="w-6 h-6 p-1 bg-red-50 rounded border border-gray-300">${SVGs.trash}</button></div><p class="text-gray-700 whitespace-pre-wrap">${m.content}</p></div>`).join(''); u.mails.forEach(m=>m.isRead=true); saveLocal(); UI.updateMailBadge(); document.getElementById('btn-load-more-mails').classList.toggle('hidden', u.mails.length <= this.mailLimit); },
            loadMore() { this.mailLimit += 10; this.renderMails(); },
            deleteMail(id) { Confirm.show("刪除信件", "確定要刪除這封信喵？", "刪除", () => { const u = getUserData(currentUser.uid); u.mails = u.mails.filter(m => m.id !== id); saveLocal(); this.renderMails(); }); },
            insertSticker(t) { document.getElementById('mail-input').value += t; }
        };

        const Report = {
            switchTab(tab) { ['self','family','stats'].forEach(t => document.getElementById(`rep-tab-${t}`).classList.toggle('bg-purple-500', tab === t)); if(tab==='stats') this.renderStats(); if(tab==='self') this.renderSelf(); if(tab==='family') this.renderFamily(); },
            renderSelf() { const u = getUserData(currentUser.uid); document.getElementById('report-total-points').innerText = u.totalCoins || 0; document.getElementById('jar-stars-container').innerHTML = `<div class="absolute inset-0 flex items-center justify-center text-4xl opacity-20">💰</div>`; },
            renderFamily() { document.getElementById('tree-nodes-container').innerHTML = users.map((u,i) => `<div class="absolute w-12 h-12" style="bottom:${20+i*20}%; left:${30+i*15}%">${SVGs[u.svgKey]}</div>`).join(''); },
            renderStats() {
                const u = getUserData(currentUser.uid);
                const currentM = new Date().getMonth(); const currentY = new Date().getFullYear();
                
                let coinData = []; let countData = []; let activeDays = new Set();
                
                Object.keys(u.habits||{}).forEach(hId => {
                    let c = 0, p = 0;
                    Object.keys(u.habits[hId]?.logs||{}).forEach(dateStr => {
                        const d = new Date(dateStr);
                        if(d.getMonth() === currentM && d.getFullYear() === currentY) {
                            c++; p += u.habits[hId].logs[dateStr].pointsEarned;
                            activeDays.add(dateStr);
                        }
                    });
                    if (c > 0 || p > 0) {
                        const hConfig = appTemplates[hId];
                        if (hConfig) {
                            const theme = THEMES.find(t=>t.id===hConfig.themeId);
                            coinData.push({ title: hConfig.title, value: p, color: theme.hex });
                            countData.push({ title: hConfig.title, value: c, color: theme.hex });
                        }
                    }
                });
                
                coinData.sort((a,b)=>b.value - a.value); countData.sort((a,b)=>b.value - a.value);
                
                document.getElementById('stats-coin-pie').innerHTML = createPieChartSVG(coinData);
                document.getElementById('stats-count-pie').innerHTML = createPieChartSVG(countData);
                document.getElementById('stats-coin-list').innerHTML = renderLeaderboard(coinData, '金幣');
                document.getElementById('stats-count-list').innerHTML = renderLeaderboard(countData, '次');
                
                document.getElementById('stats-active-days').innerText = activeDays.size;
                document.getElementById('stats-monthly-coins').innerText = coinData.reduce((s,x)=>s+x.value, 0);
                document.getElementById('stats-best-habit').innerText = countData.length > 0 ? countData[0].title : '🐾 尚未開始';
            }
        };

        const Editor = {
            open() { UI.init(); UI.toggleHabitMenu(); this.renderHabitList(); UI.openModal('editor-modal'); },
            renderHabitList() {
                document.getElementById('editor-habit-list').innerHTML = Object.values(appTemplates).map(h => `<div class="bg-white border-4 border-gray-800 rounded-xl p-3 flex justify-between items-center shadow-sm mb-3"><div class="flex items-center gap-2 max-w-[70%]"><div class="w-4 h-4 flex-shrink-0 rounded-full ${THEMES.find(t=>t.id===h.themeId)?.dot || 'bg-gray-400'} border-2 border-gray-800"></div><span class="font-black text-lg text-gray-800 truncate max-w-[120px] md:max-w-[250px]">${h.title}</span></div><button onclick="Editor.editHabit('${h.id}')" class="w-10 h-10 p-2 bg-blue-100 border-2 border-gray-800 rounded-lg hand-drawn-btn hover:bg-blue-200 flex-shrink-0">${SVGs.editPen}</button></div>`).join('');
                document.getElementById('editor-view-list').classList.remove('hidden'); document.getElementById('editor-view-detail').classList.add('hidden'); document.getElementById('editor-view-action').classList.add('hidden');
            },
            createNewHabit() { const newId = "h_" + Date.now(); appTemplates[newId] = { id: newId, title: "新習慣", themeId: "blue", roles: [{threshold:0, title:"新手"}], actions: [{ id: newId+"_a1", label: "任務一", unit: "次", icon: "star", points: 10 }] }; users.forEach(u => { if(!dailyHabitData[u.uid].habits[newId]) dailyHabitData[u.uid].habits[newId] = { logs: {}, points: 0, streak: 0, goldApples: 0 }; }); saveLocal(); this.editHabit(newId); },
            deleteHabit() { if(Object.keys(appTemplates).length <= 1) return UI.showToast("至少保留一個習慣！"); Confirm.show("刪除習慣", "紀錄會跟著消失喔！", "刪除", () => { delete appTemplates[this.tempHabitId]; saveLocal(); currentHabitId = Object.keys(appTemplates)[0]; localStorage.setItem('lastHabitId_v13', currentHabitId); UI.closeModal('editor-modal'); UI.init(); }); },
            editHabit(hId) { const h = appTemplates[hId]; document.getElementById('editor-h-title').value = h.title; this.tempRoles = JSON.parse(JSON.stringify(h.roles || [{threshold:0, title:"新手"}])); this.renderRolesEditor(); document.getElementById('editor-h-colors').innerHTML = THEMES.map(t => `<button onclick="Editor.tempTheme='${t.id}'; Editor.renderThemeSelection()" class="w-8 h-8 rounded-full ${t.dot} border-4 ${h.themeId === t.id ? 'border-gray-800 scale-110 shadow-md' : 'border-white opacity-60'}" id="col-btn-${t.id}"></button>`).join(''); this.tempTheme = h.themeId; this.tempHabitId = hId; this.renderActionListInEditor(h); document.getElementById('editor-view-list').classList.add('hidden'); document.getElementById('editor-view-detail').classList.remove('hidden'); document.getElementById('editor-view-action').classList.add('hidden'); },
            renderRolesEditor() { document.getElementById('editor-h-roles').innerHTML = this.tempRoles.map((r, i) => `<div class="flex gap-2 items-center mb-2"><span class="text-xs font-bold w-12 text-center">Lv.${i+1}</span><input type="text" value="${r.title}" onchange="Editor.tempRoles[${i}].title=this.value" class="flex-1 border-4 border-gray-800 rounded-lg p-1.5 font-bold text-xs"><input type="number" value="${r.threshold}" ${i===0?'disabled':''} onchange="Editor.tempRoles[${i}].threshold=parseInt(this.value)||0" class="w-16 border-4 border-gray-800 rounded-lg p-1.5 font-bold text-xs ${i===0?'bg-gray-200':''}" min="0">${i>0 ? `<button onclick="Editor.tempRoles.splice(${i},1); Editor.renderRolesEditor()" class="w-8 h-8 p-1.5 bg-red-100 border border-gray-800 rounded hand-drawn-btn">${SVGs.trash}</button>` : `<div class="w-8"></div>`}</div>`).join(''); },
            addRole() { this.tempRoles.push({threshold: 50, title: "新稱號"}); this.renderRolesEditor(); },
            renderThemeSelection() { THEMES.forEach(t => { const btn = document.getElementById(`col-btn-${t.id}`); btn.className = `w-8 h-8 rounded-full ${t.dot} border-4 ${this.tempTheme === t.id ? 'border-gray-800 scale-110 shadow-md' : 'border-white opacity-60'}`; }); },
            renderActionListInEditor(h) { const th = THEMES.find(t => t.id === this.tempTheme) || THEMES[0]; document.getElementById('editor-h-actions').innerHTML = h.actions.map(a => `<div onclick="Editor.editAction('${a.id}')" class="${th.btn} border-4 border-gray-800 rounded-xl p-3 flex items-center gap-3 cursor-pointer hand-drawn-btn mb-2"><div class="w-8 h-8">${SVGs.icons[a.icon]}</div><div class="flex-1"><p class="font-black text-sm">${a.label}</p></div><div class="w-8 h-8 p-1">${SVGs.editPen}</div></div>`).join(''); },
            saveHabit() { const h = appTemplates[this.tempHabitId]; h.title = document.getElementById('editor-h-title').value.trim() || "未命名"; h.themeId = this.tempTheme; h.roles = [...this.tempRoles].sort((a,b)=>a.threshold - b.threshold); saveLocal(); UI.renderHabitDropdown(); if(currentHabitId === h.id) UI.switchHabit(h.id); this.renderHabitList(); UI.showToast("設定儲存成功！"); },
            createAction() { const h = appTemplates[this.tempHabitId]; const newId = this.tempHabitId + "_a" + Date.now(); h.actions.push({ id: newId, label: "新任務", unit: "次", icon: "star", points: 10 }); saveLocal(); this.editAction(newId); },
            deleteAction() { const h = appTemplates[this.tempHabitId]; if(h.actions.length <= 1) return UI.showToast("至少保留一個任務！"); Confirm.show("刪除任務", "確定刪除？", "刪除", () => { h.actions = h.actions.filter(a => a.id !== this.tempActionId); saveLocal(); this.editHabit(this.tempHabitId); }); },
            editAction(aId) { const h = appTemplates[this.tempHabitId], a = h.actions.find(act => act.id === aId); this.tempActionId = aId; document.getElementById('editor-a-label').value = a.label; document.getElementById('editor-a-unit').value = a.unit || ""; document.getElementById('editor-a-points').value = a.points; document.getElementById('editor-a-oneclick').checked = !!a.isOneClick; document.getElementById('editor-a-micro').checked = !!a.isMicro; document.getElementById('editor-a-crit').checked = !!a.isCrit; document.getElementById('editor-a-stack').value = a.stackingText || ""; this.tempIcon = a.icon || "star"; this.renderIconSelection(); document.getElementById('editor-view-detail').classList.add('hidden'); document.getElementById('editor-view-action').classList.remove('hidden'); },
            renderIconSelection() { document.getElementById('editor-a-icongrid').innerHTML = Object.keys(SVGs.icons).map(key => `<div onclick="Editor.tempIcon='${key}'; Editor.renderIconSelection()" class="w-12 h-12 p-2 border-4 rounded-xl cursor-pointer ${this.tempIcon === key ? 'border-gray-800 bg-yellow-200 scale-110' : 'border-transparent bg-gray-100 opacity-60'}">${SVGs.icons[key]}</div>`).join(''); },
            saveActionConfig() { const h = appTemplates[this.tempHabitId], a = h.actions.find(act => act.id === this.tempActionId); a.label = document.getElementById('editor-a-label').value.trim() || "按鈕"; a.unit = document.getElementById('editor-a-unit').value.trim(); a.points = parseInt(document.getElementById('editor-a-points').value) || 1; a.icon = this.tempIcon; a.isOneClick = document.getElementById('editor-a-oneclick').checked; a.isMicro = document.getElementById('editor-a-micro').checked; a.isCrit = document.getElementById('editor-a-crit').checked; a.stackingText = document.getElementById('editor-a-stack').value.trim(); if(a.isQuote) a.isOneClick = false; saveLocal(); this.editHabit(this.tempHabitId); }
        };

        const Radio = {
            pools: {}, 
            shuffle(a) { let c=a.length,r; while(c!=0){r=Math.floor(Math.random()*c);c--;[a[c],a[r]]=[a[r],a[c]];} return a; },
            getLine() {
                const uid = currentUser.uid, uData = getUserData(uid), streak = getOverallStreak(uid);
                if(!this.pools[uid] || this.pools[uid].length === 0) {
                    let lines = [];
                    if (uid === 'user_dad') lines = [`穩紮穩打，今天也是好榜樣！`, `連勝 ${streak} 天了，繼續保持！`, `【綠公主廣播】老公辛苦了，真帥氣！`, `口袋裡有 ${uData.currentCoins} 金幣。`];
                    else if (uid === 'user_mom') lines = [`優雅地打卡了！給自己一個大大的擁抱～✨`, `已經累積 ${uData.totalCoins} 枚金幣了！`, `【狐狸廣播】老婆今天也閃閃發光！`];
                    else lines = [`跑這麼快，後面有狗在追喵？`, `連勝 ${streak} 天？算你有乖乖完成任務喵。`, `【狐狸廣播】阿蛇今天也超棒的！`, `口袋有 ${uData.currentCoins} 金幣了喵？`];
                    const valid = customRadios.filter(r => r.target === 'all' || r.target === uid).map(r=>r.text); lines = lines.concat(valid); this.pools[uid] = this.shuffle(lines);
                } return this.pools[uid].pop();
            },
            openCMS() { UI.init(); UI.toggleHabitMenu(); this.renderList(); UI.openModal('radio-modal'); },
            renderList() { document.getElementById('radio-list').innerHTML = customRadios.map(r => `<div class="bg-white border-2 border-gray-800 rounded-xl p-3 mb-2 flex justify-between items-center"><div class="max-w-[80%]"><span class="text-[10px] bg-gray-200 px-1 rounded">${r.target==='all'?'所有人':users.find(u=>u.uid===r.target).name}</span><p class="font-bold text-sm mt-1 truncate">${r.text}</p></div><button onclick="Radio.deleteLine('${r.id}')" class="w-8 h-8 p-1.5 bg-red-100 border border-gray-800 rounded hand-drawn-btn">${SVGs.trash}</button></div>`).join(''); },
            addLine() { const text = document.getElementById('radio-new-text').value.trim(), target = document.getElementById('radio-target').value; if(!text) return; customRadios.push({id: "r_"+Date.now(), text, target}); saveLocal(); document.getElementById('radio-new-text').value = ""; this.renderList(); this.pools = {}; UI.showToast("廣播台詞新增成功！"); },
            deleteLine(id) { customRadios = customRadios.filter(r => r.id !== id); saveLocal(); this.pools = {}; this.renderList(); }
        };

        const Confirm = { execute() { if(this.cb) this.cb(); UI.closeModal('generic-confirm-modal'); }, show(t, d, bt, cb) { document.getElementById('confirm-title').innerText = t; document.getElementById('confirm-desc').innerText = d; document.getElementById('confirm-btn-do').innerText = bt; this.cb = cb; UI.openModal('generic-confirm-modal'); } };
        function getUserData(uid) { return dailyHabitData[uid]; }

        window.addEventListener('DOMContentLoaded', async () => { await initDB(); UI.init(); });
    </script>
</body>
</html>
